<!DOCTYPE html>
<html lang="de">
  <head>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
      
      body {
        margin: 0;
        padding: 0;
      }
      
      .slide-container {
        width: 1280px;
        min-height: 720px;
        background: #000000;
        color: #FFFFFF;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
      }
      
      .title {
        font-family: 'Inter', sans-serif;
        font-size: 72px;
        font-weight: 700;
        margin-bottom: 20px;
        text-align: center;
        line-height: 1.2;
        text-transform: uppercase;
        letter-spacing: 10px;
      }
      
      .subtitle {
        font-family: 'Inter', sans-serif;
        font-size: 36px;
        font-weight: 300;
        margin-bottom: 60px;
        text-align: center;
        opacity: 0.8;
        letter-spacing: 5px;
      }
      
      .void-image {
        position: absolute;
        opacity: 0.2;
        z-index: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      
      .content {
        position: relative;
        z-index: 1;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }
      
      .circle {
        width: 120px;
        height: 120px;
        border: 2px solid #FFFFFF;
        border-radius: 50%;
        margin-bottom: 60px;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <img src="/home/ubuntu/p26yRmM1eABq.jpg" alt="Void Concept" class="void-image">
      <div class="content">
        <div class="circle"></div>
        <h1 class="title">ACK ATTACK</h1>
        <h2 class="subtitle">The Dystopian Revolution</h2>
      </div>
    </div>
  </body>
</html>
