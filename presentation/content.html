<!doctype html>
<html lang="de">
  <head>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');

      body {
        margin: 0;
        padding: 0;
        font-family: 'SF Pro Display', sans-serif;
        color: #4c4c4c;
      }

      .slide-container {
        width: 1280px;
        min-height: 720px;
        background: #ffffff;
        display: flex;
        box-sizing: border-box;
      }

      .image-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 60px;
      }

      .content-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 60px;
      }

      .title {
        font-family: 'Inter', sans-serif;
        font-size: 36px;
        font-weight: 600;
        color: #000000;
        margin-bottom: 40px;
        text-transform: uppercase;
      }

      .description {
        font-family: 'SF Pro Display', sans-serif;
        font-size: 24px;
        font-weight: 400;
        color: #4c4c4c;
        line-height: 1.6;
        margin-bottom: 40px;
      }

      .stats {
        font-family: 'SF Pro Display', sans-serif;
        font-size: 20px;
        font-weight: 300;
        font-style: italic;
        color: #4c4c4c;
        padding-left: 20px;
        border-left: 3px solid #000000;
      }

      .image-container img {
        max-width: 100%;
        max-height: 500px;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <div class="image-container">
        <img src="../assets/images/cgInbZoCiWw3.jpg" alt="Content Diversity" />
      </div>
      <div class="content-container">
        <h1 class="title">03 CONTENT</h1>
        <p class="description">
          Ein dynamisches Ökosystem aus über 4.500 kuratierten Fragen und 100+ reaktiven
          ACK-Kommentaren, nativ in Deutsch und Englisch.
        </p>
        <div class="stats">
          "Systemstatus: Bilinguale Sarkasmus-Engine online. Datenintegrität bei 100%."
        </div>
      </div>
    </div>
  </body>
</html>
