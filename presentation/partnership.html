<!doctype html>
<html lang="de">
  <head>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');

      body {
        margin: 0;
        padding: 0;
        font-family: 'SF Pro Display', sans-serif;
        color: #4c4c4c;
      }

      .slide-container {
        width: 1280px;
        min-height: 720px;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        padding: 60px;
        box-sizing: border-box;
      }

      .title-container {
        margin-bottom: 40px;
      }

      .title {
        font-family: 'Inter', sans-serif;
        font-size: 36px;
        font-weight: 600;
        color: #000000;
        text-transform: uppercase;
      }

      .content-container {
        display: flex;
        flex: 1;
      }

      .image-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding-right: 60px;
      }

      .image-container img {
        max-width: 100%;
        max-height: 450px;
        object-fit: contain;
      }

      .text-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .description {
        font-family: 'SF Pro Display', sans-serif;
        font-size: 24px;
        font-weight: 400;
        color: #4c4c4c;
        line-height: 1.6;
        margin-bottom: 40px;
      }

      .quote {
        font-family: 'SF Pro Display', sans-serif;
        font-size: 20px;
        font-weight: 300;
        font-style: italic;
        color: #4c4c4c;
        padding-left: 20px;
        border-left: 3px solid #000000;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <div class="title-container">
        <h1 class="title">PARTNERSCHAFTS-MODELL</h1>
      </div>
      <div class="content-container">
        <div class="image-container">
          <img src="../assets/images/wisdom.png" alt="Partnership Concept" />
        </div>
        <div class="text-container">
          <p class="description">
            Wir bieten unseren Distributoren volle Unterstützung: Marketing-Assets, direkten
            API-Zugang für eigene Dashboards und dedizierten technischen Support.
          </p>
          <p class="quote">
            "Gemeinsam kontrollieren wir den Datensatz. Deine Distribution, unsere Technologie."
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
