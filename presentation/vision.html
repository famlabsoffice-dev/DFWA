<!DOCTYPE html>
<html lang="de">
  <head>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
      
      body {
        margin: 0;
        padding: 0;
      }
      
      .slide-container {
        width: 1280px;
        min-height: 720px;
        background: #FFFFFF;
        color: #333333;
        display: flex;
        position: relative;
        overflow: hidden;
      }
      
      .visual-half {
        width: 50%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 80px;
        box-sizing: border-box;
      }
      
      .visual-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
        opacity: 0.9;
      }
      
      .content-half {
        width: 50%;
        height: 100%;
        padding: 80px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      
      .title {
        font-family: 'Inter', sans-serif;
        font-size: 48px;
        font-weight: 700;
        margin-bottom: 24px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      
      .body-text {
        font-family: 'Inter', sans-serif;
        font-size: 20px;
        line-height: 1.6;
        font-weight: 300;
      }
      
      .quote-block {
        margin-top: 40px;
        padding-left: 20px;
        border-left: 4px solid #333;
        font-style: italic;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <div class="visual-half">
        <img src="../assets/images/O70f6V3q2u4L.jpg" alt="Minimalist Silence" class="visual-image">
      </div>
      <div class="content-half">
        <h1 class="title">01 DIE VISION</h1>
        <p class="body-text">
          ACK ATTACK ist ein dystopisches System-Override-Erlebnis. Es bricht die vierte Wand durch sarkastische Interaktion und versetzt Spieler in eine Cyberpunk-Atmosphäre.
        </p>
        <div class="quote-block">
          "Mehr als nur ein Quiz – eine psychologische Bindung durch Provokation."
        </div>
      </div>
    </div>
  </body>
</html>
