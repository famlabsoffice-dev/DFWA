<!DOCTYPE html>
<html lang="de">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=SF+Pro:wght@300;400;600&display=swap');
      
      body {
        margin: 0;
        padding: 0;
        font-family: 'SF Pro', sans-serif;
      }
      
      .slide-container {
        width: 1280px;
        min-height: 720px;
        background: #FFFFFF;
        color: #000000;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      .content {
        width: 90%;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .text-column {
        width: 45%;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      
      .image-column {
        width: 45%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      .title {
        font-family: 'Inter', sans-serif;
        font-size: 36px;
        font-weight: 600;
        margin-bottom: 30px;
        color: #000000;
        text-transform: uppercase;
      }
      
      .description {
        font-family: 'SF Pro', sans-serif;
        font-size: 20px;
        line-height: 1.6;
        color: #4C4C4C;
        margin-bottom: 30px;
      }
      
      .financial-metrics {
        display: flex;
        flex-direction: column;
      }
      
      .metric {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
      }
      
      .metric-symbol {
        font-family: 'Inter', sans-serif;
        font-size: 24px;
        font-weight: 600;
        color: #0033CC;
        margin-right: 15px;
        width: 30px;
        text-align: center;
      }
      
      .metric-text {
        font-family: 'SF Pro', sans-serif;
        font-size: 18px;
        color: #4C4C4C;
      }
      
      .chart-container {
        width: 100%;
        height: 400px;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <div class="content">
        <div class="text-column">
          <h1 class="title">FINANZPROGNOSE 2026-2028</h1>
          <p class="description">Ein profitables Geschäftsmodell mit skalierbaren Erlösströmen und einer starken EBITDA-Marge.</p>
          
          <div class="financial-metrics">
            <div class="metric">
              <div class="metric-symbol">€</div>
              <div class="metric-text">Umsatz-Ziel 2028: €2.5 Millionen</div>
            </div>
            <div class="metric">
              <div class="metric-symbol">%</div>
              <div class="metric-text">Ziel-EBITDA Marge: 35%</div>
            </div>
            <div class="metric">
              <div class="metric-symbol">↗</div>
              <div class="metric-text">Wachstumsrate (CAGR): ~120%</div>
            </div>
          </div>
        </div>
        
        <div class="image-column">
          <div class="chart-container">
            <canvas id="financialChart"></canvas>
          </div>
        </div>
      </div>
    </div>
    <script>
      const ctx = document.getElementById('financialChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['2026', '2027', '2028'],
          datasets: [{
            label: 'Umsatz in T€',
            data: [500, 1200, 2500],
            backgroundColor: '#0033CC',
            borderRadius: 5
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, grid: { display: false } },
            x: { grid: { display: false } }
          }
        }
      });
    </script>
  </body>
</html>
