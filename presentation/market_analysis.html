<!DOCTYPE html>
<html lang="de">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=SF+Pro:wght@300;400;600&display=swap');
      
      body {
        margin: 0;
        padding: 0;
        font-family: 'SF Pro', sans-serif;
      }
      
      .slide-container {
        width: 1280px;
        min-height: 720px;
        background: #FFFFFF;
        color: #000000;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      .content {
        width: 90%;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .text-column {
        width: 45%;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      
      .image-column {
        width: 45%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      .title {
        font-family: 'Inter', sans-serif;
        font-size: 36px;
        font-weight: 600;
        margin-bottom: 30px;
        color: #000000;
        text-transform: uppercase;
      }
      
      .description {
        font-family: 'SF Pro', sans-serif;
        font-size: 20px;
        line-height: 1.6;
        color: #4C4C4C;
        margin-bottom: 30px;
      }
      
      .market-stats {
        display: flex;
        flex-direction: column;
      }
      
      .stat {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
      }
      
      .stat-symbol {
        font-family: 'Inter', sans-serif;
        font-size: 24px;
        font-weight: 600;
        color: #0033CC;
        margin-right: 15px;
        width: 30px;
        text-align: center;
      }
      
      .stat-text {
        font-family: 'SF Pro', sans-serif;
        font-size: 18px;
        color: #4C4C4C;
      }
      
      .chart-container {
        width: 100%;
        height: 400px;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <div class="content">
        <div class="text-column">
          <h1 class="title">MARKTANALYSE 2026/27</h1>
          <p class="description">Der Trivia-Markt expandiert massiv. PWA-Technologie ist der entscheidende Hebel, um Nutzer ohne Download-Hürden zu erreichen.</p>
          
          <div class="market-stats">
            <div class="stat">
              <div class="stat-symbol">$</div>
              <div class="stat-text">Global Trivia Market: $15.7 Mrd. bis 2032</div>
            </div>
            <div class="stat">
              <div class="stat-symbol">%</div>
              <div class="stat-text">Mobile Gaming CAGR: 12.4% (2026-2030)</div>
            </div>
            <div class="stat">
              <div class="stat-symbol">↗</div>
              <div class="stat-text">PWA Adoption: +45% im Bereich Casual Gaming</div>
            </div>
          </div>
        </div>
        
        <div class="image-column">
          <div class="chart-container">
            <canvas id="marketChart"></canvas>
          </div>
        </div>
      </div>
    </div>
    <script>
      const ctx = document.getElementById('marketChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['2024', '2026', '2028', '2030', '2032'],
          datasets: [{
            label: 'Trivia Market Size ($B)',
            data: [8.4, 10.2, 12.1, 13.9, 15.7],
            backgroundColor: '#0033CC',
            borderRadius: 5
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, grid: { display: false } },
            x: { grid: { display: false } }
          }
        }
      });
    </script>
  </body>
</html>
