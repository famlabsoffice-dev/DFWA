<!DOCTYPE html>
<html lang="de">
  <head>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');
      
      body {
        margin: 0;
        padding: 0;
        font-family: 'SF Pro Display', sans-serif;
        color: #4C4C4C;
      }
      
      .slide-container {
        width: 1280px;
        min-height: 720px;
        background: #FFFFFF;
        display: flex;
        box-sizing: border-box;
      }
      
      .image-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 60px;
      }
      
      .content-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 60px;
      }
      
      .title {
        font-family: 'Inter', sans-serif;
        font-size: 36px;
        font-weight: 600;
        color: #000000;
        margin-bottom: 40px;
        text-transform: uppercase;
      }
      
      .roadmap-list {
        list-style: none;
        padding: 0;
        margin-bottom: 40px;
      }
      
      .roadmap-step {
        display: flex;
        align-items: flex-start;
        margin-bottom: 20px;
      }
      
      .step-date {
        font-weight: 700;
        color: #0033CC;
        width: 80px;
        flex-shrink: 0;
      }
      
      .step-desc {
        font-size: 18px;
        line-height: 1.4;
      }
      
      .quote {
        font-family: 'SF Pro Display', sans-serif;
        font-size: 20px;
        font-weight: 300;
        font-style: italic;
        color: #4C4C4C;
        padding-left: 20px;
        border-left: 3px solid #000000;
      }
      
      .image-container img {
        max-width: 100%;
        max-height: 500px;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <div class="image-container">
        <img src="../assets/images/cgInbZoCiWw3.jpg" alt="Strategic Roadmap">
      </div>
      <div class="content-container">
        <h1 class="title">STRATEGISCHE ROADMAP</h1>
        <div class="roadmap-list">
          <div class="roadmap-step">
            <span class="step-date">Q3 2026</span>
            <span class="step-desc">Globaler PWA-Launch & Distributor Onboarding</span>
          </div>
          <div class="roadmap-step">
            <span class="step-date">Q4 2026</span>
            <span class="step-desc">Einführung der "Sarkasmus-Engine 2.0" & Multi-Themen-Support</span>
          </div>
          <div class="roadmap-step">
            <span class="step-date">2027</span>
            <span class="step-desc">KI-gestützte dynamische Fragen-Generierung & AR-Integration</span>
          </div>
        </div>
        <p class="quote">"Die Zukunft des Quizzens ist dystopisch. Wir bauen sie."</p>
      </div>
    </div>
  </body>
</html>
