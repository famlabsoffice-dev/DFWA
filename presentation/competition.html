<!doctype html>
<html lang="de">
  <head>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');

      body {
        margin: 0;
        padding: 0;
        font-family: 'SF Pro Display', sans-serif;
        color: #4c4c4c;
      }

      .slide-container {
        width: 1280px;
        min-height: 720px;
        background: #ffffff;
        display: flex;
        box-sizing: border-box;
      }

      .image-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 60px;
      }

      .content-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 60px;
      }

      .title {
        font-family: 'Inter', sans-serif;
        font-size: 36px;
        font-weight: 600;
        color: #000000;
        margin-bottom: 40px;
        text-transform: uppercase;
      }

      .comp-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 40px;
      }

      .comp-table th {
        text-align: left;
        padding: 10px;
        border-bottom: 2px solid #000;
        font-size: 16px;
        text-transform: uppercase;
      }

      .comp-table td {
        padding: 15px 10px;
        border-bottom: 1px solid #e5e5e5;
        font-size: 18px;
      }

      .highlight {
        color: #0033cc;
        font-weight: 700;
      }

      .quote {
        font-family: 'SF Pro Display', sans-serif;
        font-size: 20px;
        font-weight: 300;
        font-style: italic;
        color: #4c4c4c;
        padding-left: 20px;
        border-left: 3px solid #000000;
      }

      .image-container img {
        max-width: 100%;
        max-height: 500px;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <div class="image-container">
        <img src="../assets/images/EJfvRlLmbd0h.jpg" alt="Competition Comparison" />
      </div>
      <div class="content-container">
        <h1 class="title">WETTBEWERBSANALYSE</h1>
        <table class="comp-table">
          <thead>
            <tr>
              <th>Feature</th>
              <th>ACK ATTACK</th>
              <th>Jackbox</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Installation</td>
              <td class="highlight">Keine (PWA)</td>
              <td>App/Konsole</td>
            </tr>
            <tr>
              <td>Update</td>
              <td class="highlight">Real-Time</td>
              <td>Manual</td>
            </tr>
            <tr>
              <td>Interaktion</td>
              <td class="highlight">Sarkasmus-AI</td>
              <td>Host-Script</td>
            </tr>
            <tr>
              <td>Global Ready</td>
              <td class="highlight">Bilingual Nativ</td>
              <td>Lokalisiert</td>
            </tr>
          </tbody>
        </table>
        <p class="quote">"Andere stellen Fragen. Wir testen deine Existenz."</p>
      </div>
    </div>
  </body>
</html>
