<!doctype html>
<html lang="de">
  <head>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=SF+Pro:wght@300;400;600&display=swap');

      body {
        margin: 0;
        padding: 0;
        font-family: 'SF Pro', sans-serif;
      }

      .slide-container {
        width: 1280px;
        min-height: 720px;
        background: #ffffff;
        color: #000000;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .content {
        width: 90%;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .text-column {
        width: 45%;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .image-column {
        width: 45%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .title {
        font-family: 'Inter', sans-serif;
        font-size: 36px;
        font-weight: 600;
        margin-bottom: 30px;
        color: #000000;
        text-transform: uppercase;
      }

      .description {
        font-family: 'SF Pro', sans-serif;
        font-size: 20px;
        line-height: 1.6;
        color: #4c4c4c;
        margin-bottom: 30px;
      }

      .model-list {
        display: flex;
        flex-direction: column;
      }

      .model {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
      }

      .model-symbol {
        font-family: 'Inter', sans-serif;
        font-size: 24px;
        font-weight: 600;
        color: #0033cc;
        margin-right: 15px;
        width: 30px;
        text-align: center;
      }

      .model-text {
        font-family: 'SF Pro', sans-serif;
        font-size: 18px;
        color: #4c4c4c;
      }

      .roi-image {
        width: 400px;
        height: auto;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <div class="content">
        <div class="text-column">
          <h1 class="title">MONETARISIERUNG & ROI</h1>
          <p class="description">
            Ein hochgradig skalierbares Erlösmodell für nachhaltiges Wachstum und schnellen Return
            on Investment.
          </p>

          <div class="model-list">
            <div class="model">
              <div class="model-symbol">€</div>
              <div class="model-text">Micro-Transactions & Premium Content</div>
            </div>
            <div class="model">
              <div class="model-symbol">📈</div>
              <div class="model-text">In-System Advertising & Sponsored Quizzes</div>
            </div>
            <div class="model">
              <div class="model-symbol">🤝</div>
              <div class="model-text">B2B White-Labeling für Marken-Events</div>
            </div>
          </div>
        </div>

        <div class="image-column">
          <img src="../assets/images/BA2stqt8PMee.png" alt="ROI Concept" class="roi-image" />
        </div>
      </div>
    </div>
  </body>
</html>
