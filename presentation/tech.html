<!DOCTYPE html>
<html lang="de">
  <head>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=SF+Pro:wght@300;400;600&display=swap');
      
      body {
        margin: 0;
        padding: 0;
        font-family: 'SF Pro', sans-serif;
      }
      
      .slide-container {
        width: 1280px;
        min-height: 720px;
        background: #FFFFFF;
        color: #000000;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      .content {
        width: 90%;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .text-column {
        width: 45%;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      
      .image-column {
        width: 45%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      .title {
        font-family: 'Inter', sans-serif;
        font-size: 36px;
        font-weight: 600;
        margin-bottom: 30px;
        color: #000000;
        text-transform: uppercase;
      }
      
      .description {
        font-family: 'SF Pro', sans-serif;
        font-size: 20px;
        line-height: 1.6;
        color: #4C4C4C;
        margin-bottom: 30px;
      }
      
      .feature-list {
        display: flex;
        flex-direction: column;
      }
      
      .feature {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
      }
      
      .feature-symbol {
        font-family: 'Inter', sans-serif;
        font-size: 24px;
        font-weight: 600;
        color: #0033CC;
        margin-right: 15px;
        width: 30px;
        text-align: center;
      }
      
      .feature-text {
        font-family: 'SF Pro', sans-serif;
        font-size: 18px;
        color: #4C4C4C;
      }
      
      .tech-image {
        width: 400px;
        height: auto;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <div class="content">
        <div class="text-column">
          <h1 class="title">02 TECHNIK</h1>
          <p class="description">Modernste PWA-Architektur für maximale Effizienz. ACK ATTACK nutzt fortschrittliche Web-Technologien für ein nahtloses Erlebnis.</p>
          
          <div class="feature-list">
            <div class="feature">
              <div class="feature-symbol">⚡</div>
              <div class="feature-text">Zero-Latency Updates via Service Worker</div>
            </div>
            <div class="feature">
              <div class="feature-symbol">🌐</div>
              <div class="feature-text">Offline-First Spielbarkeit nach erstem Laden</div>
            </div>
            <div class="feature">
              <div class="feature-symbol">📱</div>
              <div class="feature-text">Multi-Plattform: iOS, Android & Desktop</div>
            </div>
          </div>
        </div>
        
        <div class="image-column">
          <img src="/home/ubuntu/BA2stqt8PMee.png" alt="Tech Concept" class="tech-image">
        </div>
      </div>
    </div>
  </body>
</html>
