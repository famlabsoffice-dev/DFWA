<!DOCTYPE html>
<html lang="de">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');
      
      body {
        margin: 0;
        padding: 0;
        font-family: 'SF Pro Display', sans-serif;
        color: #4C4C4C;
      }
      
      .slide-container {
        width: 1280px;
        min-height: 720px;
        background: #FFFFFF;
        display: flex;
        box-sizing: border-box;
      }
      
      .image-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 60px;
      }
      
      .content-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 60px;
      }
      
      .title {
        font-family: 'Inter', sans-serif;
        font-size: 36px;
        font-weight: 600;
        color: #000000;
        margin-bottom: 40px;
        text-transform: uppercase;
      }
      
      .performance-list {
        list-style: none;
        padding: 0;
        margin-bottom: 40px;
      }
      
      .performance-item {
        display: flex;
        justify-content: space-between;
        padding: 15px 0;
        border-bottom: 1px solid #E5E5E5;
        font-size: 20px;
      }
      
      .metric-name {
        font-weight: 600;
        color: #000000;
      }
      
      .metric-value {
        color: #0033CC;
        font-weight: 700;
      }
      
      .quote {
        font-family: 'SF Pro Display', sans-serif;
        font-size: 20px;
        font-weight: 300;
        font-style: italic;
        color: #4C4C4C;
        padding-left: 20px;
        border-left: 3px solid #000000;
      }
      
      .chart-wrapper {
        width: 100%;
        height: 400px;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <div class="image-container">
        <div class="chart-wrapper">
          <canvas id="performanceChart"></canvas>
        </div>
      </div>
      <div class="content-container">
        <h1 class="title">04 PERFORMANCE</h1>
        <div class="performance-list">
          <div class="performance-item">
            <span class="metric-name">Ladezeit</span>
            <span class="metric-value">&lt; 200ms</span>
          </div>
          <div class="performance-item">
            <span class="metric-name">PWA Score</span>
            <span class="metric-value">100/100</span>
          </div>
          <div class="performance-item">
            <span class="metric-name">Update-Speed</span>
            <span class="metric-value">Real-Time</span>
          </div>
          <div class="performance-item">
            <span class="metric-name">Interaktion</span>
            <span class="metric-value">60 FPS</span>
          </div>
        </div>
        <p class="quote">"Zu langsam für das System. Zu schnell für deine Sinne."</p>
      </div>
    </div>
    <script>
      const ctx = document.getElementById('performanceChart').getContext('2d');
      new Chart(ctx, {
        type: 'radar',
        data: {
          labels: ['Speed', 'Stability', 'PWA', 'FPS', 'Update'],
          datasets: [{
            label: 'System Metrics',
            data: [95, 100, 100, 90, 100],
            backgroundColor: 'rgba(0, 51, 204, 0.2)',
            borderColor: '#0033CC',
            borderWidth: 2
          }]
        },
        options: {
          scales: {
            r: {
              beginAtZero: true,
              max: 100,
              ticks: { display: false }
            }
          },
          plugins: { legend: { display: false } }
        }
      });
    </script>
  </body>
</html>
