<!DOCTYPE html>
<html lang="de">
  <head>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');
      
      body {
        margin: 0;
        padding: 0;
        font-family: 'SF Pro Display', sans-serif;
        color: #4C4C4C;
      }
      
      .slide-container {
        width: 1280px;
        min-height: 720px;
        background: #FFFFFF;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 60px;
        box-sizing: border-box;
      }
      
      .title {
        font-family: 'Inter', sans-serif;
        font-size: 72px;
        font-weight: 700;
        color: #000000;
        margin-bottom: 40px;
        text-align: center;
        text-transform: uppercase;
      }
      
      .subtitle {
        font-family: 'SF Pro Display', sans-serif;
        font-size: 36px;
        font-weight: 400;
        color: #4C4C4C;
        margin-bottom: 60px;
        text-align: center;
      }
      
      /* Reduced image height to remove overflow while keeping title spacing */
      .image-container {
        width: 500px;
        height: 256px; /* reduced from 300px */
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 40px;
      }
      
      .image-container img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <div class="image-container">
        <img src="../assets/images/tEhFP10dWGYG.jpg" alt="System Ready">
      </div>
      <h1 class="title">SYSTEM BEREIT</h1>
      <h2 class="subtitle">Bereit für die globale Distribution. Protokoll abgeschlossen.</h2>
    </div>
  </body>
</html>
