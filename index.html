<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="./manifest.json">
    <title>ACK ATTACK - SYSTEM OVERRIDE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #39ff14;
            --neon-bg: rgba(57, 255, 20, 0.1);
            --error: #ff003c;
            --warning: #f4ea11;
            --cyber-blue: #00d2ff;
            --black: #000000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; 
            overflow: hidden; background: #000; color: var(--neon);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0.6) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 1000;
        }

        #game-container { width: 100%; height: 100%; position: relative; overflow: hidden; background: #000; }

        .screen { display: none; flex-direction: column; height: 100%; position: relative; z-index: 10; }
        .screen.active { display: flex; }

        h1 { 
            font-family: Impact, sans-serif; font-size: clamp(3rem, 15vw, 5rem); text-align: center; 
            letter-spacing: 15px; position: absolute; top: 2vh; left: 50%; transform: translateX(-45.0%); width: 100%;
            z-index: 30; font-weight: 900; color: var(--neon);
        }

        #eye-bg-container {
            position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
            width: 140vw; height: 140vw; max-width: 1100px; z-index: 5; pointer-events: none;
            filter: contrast(1.5) drop-shadow(0 0 40px var(--neon));
            animation: irisPulse 5s ease-in-out infinite;
        }
        @keyframes irisPulse {
            0%, 100% { filter: contrast(1.5) drop-shadow(0 0 20px var(--neon)); transform: translate(-50%, -50%) scale(1); }
            50% { filter: contrast(2.0) drop-shadow(0 0 80px var(--neon)); transform: translate(-50%, -50%) scale(1.01); }
        }
        #core-eye { width: 100%; height: 100%; object-fit: contain; }

        .stat-overlay {
            position: absolute; font-size: 0.85rem; color: var(--neon);
            text-transform: uppercase; font-weight: 900; z-index: 25;
            line-height: 1.2; letter-spacing: 0.5px;
        }
        #stat-player { top: 30%; left: 15%; }
        #stat-lives { top: 30%; right: 15%; text-align: right; }
        #stat-id { bottom: 35%; left: 15%; }
        #stat-best { bottom: 35%; right: 15%; text-align: right; }

        .ui-content-wrapper {
            margin-top: 52vh; display: flex; flex-direction: column; align-items: center;
            width: 100%; z-index: 40; padding: 0 25px;
        }

        .option-btn {
            background: rgba(0,0,0,0.95); border: 1px solid var(--neon); color: var(--neon);
            padding: 18px; font-size: 0.9rem; text-transform: uppercase; cursor: pointer;
            font-weight: 900; width: 100%; max-width: 420px; margin-bottom: 12px;
        }
        .option-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }
        .start-btn { border-color: var(--cyber-blue); color: var(--cyber-blue); }
        .battle-btn { border-color: var(--warning); color: var(--warning); }

        .cyber-input, .cyber-select { 
            background: rgba(0,0,0,0.95); border: 1px solid var(--cyber-blue); padding: 14px; 
            width: 100%; max-width: 420px; margin: 6px 0; font-weight: 900; color: var(--cyber-blue);
            text-align: center;
        }

        #timeline-container {
            width: 100%; max-width: 600px; height: 4px; background: rgba(255,255,255,0.1);
            position: absolute; top: 12vh; left: 50%; transform: translateX(-50%); z-index: 50;
        }
        #timeline-bar { width: 100%; height: 100%; background: var(--neon); transition: width 0.1s linear; }

        #question-box { height: 25vh; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 1.5rem; padding: 25px; margin-top: 15vh; pointer-events: none; }
        #options-container { display: flex; flex-direction: column; align-items: center; padding: 0 25px; margin-bottom: 80px; }

        #feedback-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: none; flex-direction: column;
            align-items: center; justify-content: space-between; padding: 5vh 0;
        }
        #feedback-screen.active { display: flex; }
        #feedback-eye-container {
            position: relative; width: 80vw; max-width: 500px; height: 40vh; margin-top: 5vh;
            transition: transform 0.5s ease-in-out;
        }
        #feedback-eye-base { width: 100%; height: 100%; object-fit: contain; }
        .zoom-anim { transform: scale(1.8); }

        #feedback-msg { 
            width: 90%; max-width: 600px; padding: 30px; border: 2px solid var(--neon);
            background: rgba(0,0,0,0.9); color: var(--neon); font-size: 1.2rem;
            text-align: center; margin-bottom: 10vh; font-family: 'Courier New', monospace;
        }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 3000; display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        #modal-content {
            background: #000; border: 2px solid var(--warning); padding: 30px;
            width: 100%; max-width: 500px; text-align: center;
        }

        #pause-btn {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); border: 1px solid var(--neon); color: var(--neon);
            padding: 12px 25px; cursor: pointer; z-index: 100; font-weight: 900;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="game-container">
        <h1>A.C.K.</h1>
        <div id="start-screen" class="screen active">
            <div id="eye-bg-container">
                <img id="core-eye" src="./assets/images/ack_core_clean.png">
                <div id="stat-player" class="stat-overlay">USER_IDENT//<br><span id="player-display">GUEST</span></div>
                <div id="stat-lives" class="stat-overlay">VITAL_SIGNS//<br><span id="lives-display">3</span>_UNITS</div>
                <div id="stat-id" class="stat-overlay">CORE_LINK//<br>#<span id="id-display">0000</span></div>
                <div id="stat-best" class="stat-overlay">PEAK_DATA//<br><span id="high-score">0</span>_PTS<br><span id="battle-stats" style="color:var(--warning); font-size:0.65rem;">W:0 / L:0</span></div>
            </div>
            <div class="ui-content-wrapper">
                <p style="color:var(--cyber-blue); letter-spacing:3px; font-weight:900; font-size:0.8rem; margin-bottom:2.5vh; white-space: nowrap;">AUTONOMOUS CYBERNETIC KNOWLEDGE</p>
                <input type="text" id="player-name" class="cyber-input" placeholder="ENTER_CODENAME" maxlength="12">
                <select id="category-filter" class="cyber-select">
                    <option value="all">ALL_SECTORS</option>
                    <option value="Fussball">FUSSBALL</option>
                    <option value="Erdkunde">ERDKUNDE</option>
                    <option value="Musik">MUSIK</option>
                    <option value="Absurd">ABSURD</option>
                    <option value="Sci-Fi">SCI-FI</option>
                    <option value="Technik">TECHNIK</option>
                    <option value="Humor">HUMOR</option>
                    <option value="Natur">NATUR</option>
                    <option value="Film">FILM</option>
                    <option value="Gegenteil">GEGENTEIL</option>
                </select>
                <button id="resume-btn" class="option-btn battle-btn" style="display:none;" onclick="resumeProtocol()">RESUME_PROTOCOL</button>
                <button id="start-btn" class="option-btn start-btn" onclick="initGame(false)">INIT_PROTOCOL</button>
                <button class="option-btn battle-btn" onclick="showLobby()">BATTLE_LOBBY</button>
            </div>
        </div>

        <div id="battle-lobby" class="screen">
            <div class="ui-content-wrapper" style="margin-top: 20vh;">
                <h2 style="color:var(--warning); margin-bottom: 20px;">BATTLE_OVERRIDE</h2>
                <input type="text" id="challenge-code-input" class="cyber-input" style="border-color: var(--warning); color: var(--warning);" placeholder="ENTER_CHALLENGE_CODE">
                <button class="option-btn battle-btn" onclick="startChallenge()">START_CHALLENGE</button>
                <button class="option-btn" onclick="hideLobby()">BACK_TO_CORE</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div id="timeline-container"><div id="timeline-bar"></div></div>
            <div id="question-box">INITIALIZING...</div>
            <div id="options-container"></div>
            <button id="pause-btn" onclick="pauseProtocol()">PAUSE</button>
        </div>
    </div>

    <div id="feedback-screen">
        <div id="feedback-eye-container">
            <img id="feedback-eye-base" src="./assets/images/ack_core_clean.png">
        </div>
        <div id="feedback-msg"></div>
    </div>

    <div id="modal-overlay">
        <div id="modal-content">
            <h2 id="modal-title" style="color: var(--warning); margin-bottom: 20px;">CHALLENGE_COMPLETE</h2>
            <p id="modal-text" style="color: #fff; margin-bottom: 20px; font-family: monospace; word-break: break-all;"></p>
            <button class="option-btn" onclick="location.reload()">CLOSE_SYSTEM</button>
        </div>
    </div>

    <script>
        let state = { 
            lang: 'de', questions: [], current: 0, score: 0, lives: 3,
            playerName: localStorage.getItem('dfwa_name') || 'GUEST',
            playerId: localStorage.getItem('dfwa_id') || Math.floor(1000 + Math.random() * 9000).toString(),
            best: parseInt(localStorage.getItem('dfwa_best') || 0),
            wins: parseInt(localStorage.getItem('dfwa_wins') || 0),
            losses: parseInt(localStorage.getItem('dfwa_losses') || 0),
            comments: {}, usedComments: { correct: [], incorrect: [] },
            isPaused: false, isProcessing: false, timer: 15, timerInterval: null,
            isChallenge: false, isCreatingChallenge: false, challengeSeed: null, opponentScore: 0,
            pausedQuestion: null, pausedTimer: null, cheatsAttempted: false
        };

        function detectLanguage() {
            state.lang = navigator.language.startsWith('de') ? 'de' : 'en';
            document.getElementById('start-btn').innerText = state.lang === 'de' ? 'PROTOKOLL_STARTEN' : 'INIT_PROTOCOL';
            document.getElementById('player-display').innerText = state.playerName;
            document.getElementById('id-display').innerText = state.playerId;
            document.getElementById('high-score').innerText = state.best;
            document.getElementById('battle-stats').innerText = `W:${state.wins} / L:${state.losses}`;
            document.getElementById('player-name').value = state.playerName !== 'GUEST' ? state.playerName : '';
        }
        detectLanguage();

        function showLobby() {
            state.playerName = document.getElementById('player-name').value.trim() || 'GUEST';
            localStorage.setItem('dfwa_name', state.playerName);
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('battle-lobby').classList.add('active');
        }

        function hideLobby() {
            document.getElementById('battle-lobby').classList.remove('active');
            document.getElementById('start-screen').classList.add('active');
        }

        function startChallenge() {
            const code = document.getElementById('challenge-code-input').value.trim();
            if (code) {
                try {
                    const data = JSON.parse(atob(code));
                    state.isChallenge = true;
                    state.challengeSeed = data.seed;
                    state.opponentScore = data.score;
                    initGame(false);
                } catch(e) { alert("INVALID_CODE"); }
            } else {
                initGame(true);
            }
        }

        function generateChallengeCode() {
            const seed = Math.floor(Math.random() * 1000000);
            const data = { seed: seed, score: state.score };
            return btoa(JSON.stringify(data));
        }

        function shuffle(array, seed) {
            let m = array.length, t, i;
            while (m) {
                i = Math.floor((seed ? (Math.sin(seed++) * 10000) % 1 : Math.random()) * m--);
                t = array[m]; array[m] = array[i]; array[i] = t;
            }
            return array;
        }

        function pauseProtocol() {
            state.isPaused = true;
            state.cheatsAttempted = false;
            state.pausedQuestion = state.current;
            state.pausedTimer = state.timer;
            clearInterval(state.timerInterval);
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('start-screen').classList.add('active');
            document.getElementById('resume-btn').style.display = 'block';
        }

        function resumeProtocol() {
            if (state.cheatsAttempted) {
                alert('CHEAT_DETECTED: Spiel wird neu gestartet.');
                initGame(false);
                return;
            }
            state.isPaused = false;
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('resume-btn').style.display = 'none';
            state.timer = state.pausedTimer || 15;
            startTimer();
        }

        async function initGame(createChallenge) {
            state.isCreatingChallenge = createChallenge;
            state.playerName = document.getElementById('player-name').value.trim() || 'GUEST';
            localStorage.setItem('dfwa_name', state.playerName);
            state.lives = 3; state.current = 0; state.score = 0;
            document.getElementById("lives-display").innerText = state.lives; // UI-Update für Leben bei Spielstart
            
            const [qRes, cRes] = await Promise.all([fetch('questions_i18n.json'), fetch('ack_comments.json')]);
            let allQuestions = await qRes.json();
            state.comments = await cRes.json();

            const selectedCat = document.getElementById('category-filter').value;
            if (selectedCat !== 'all') {
                allQuestions = allQuestions.filter(q => q.cat === selectedCat);
            }

            state.questions = shuffle(allQuestions, state.isChallenge ? state.challengeSeed : null);
            
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('battle-lobby').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            renderQuestion();
        }

        async function loadCategories() {
            const res = await fetch('questions_i18n.json');
            const questions = await res.json();
            const cats = [...new Set(questions.map(q => q.cat))];
            const filter = document.getElementById('category-filter');
            filter.innerHTML = `<option value="all">${state.lang === 'de' ? 'ALLE_SEKTOREN' : 'ALL_SECTORS'}</option>`;
            cats.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = cat.toUpperCase();
                filter.appendChild(opt);
            });
        }
        loadCategories();

        function startTimer() {
            clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                state.timer -= 0.1;
                document.getElementById('timeline-bar').style.width = (state.timer / 15 * 100) + '%';
                if (state.timer <= 0) {
                    clearInterval(state.timerInterval);
                    checkAnswer(false);
                }
            }, 100);
        }

        function renderQuestion() {
            if (state.current >= state.questions.length) {
                state.current = 0;
                state.questions = shuffle(state.questions, null);
            }
            const q = state.questions[state.current];
            if (!q) return endGame();
            state.timer = 15;
            document.getElementById('question-box').innerText = q.text[state.lang];
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options[state.lang].forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i === q.correct);
                container.appendChild(btn);
            });
            startTimer();
        }

        function endGame() {
            clearInterval(state.timerInterval);
            const overlay = document.getElementById('modal-overlay');
            const text = document.getElementById('modal-text');
            const title = document.getElementById('modal-title');
            
            overlay.style.display = 'flex';
            
            if (state.isCreatingChallenge) {
                title.innerText = "CHALLENGE_CREATED";
                text.innerText = generateChallengeCode();
            } else if (state.isChallenge) {
                const win = state.score > state.opponentScore;
                title.innerText = win ? "VICTORY" : "DEFEAT";
                text.innerText = `YOUR_SCORE: ${state.score}\nOPPONENT: ${state.opponentScore}`;
                if (win) { state.wins++; localStorage.setItem('dfwa_wins', state.wins); }
                else { state.losses++; localStorage.setItem('dfwa_losses', state.losses); }
            } else {
                title.innerText = "PROTOCOL_COMPLETE";
                text.innerText = `FINAL_SCORE: ${state.score}`;
            }

            if (state.score > state.best) {
                state.best = state.score;
                localStorage.setItem('dfwa_best', state.best);
            }
        }

        function getComment(type) {
            let pool = state.comments[state.lang][type];
            let available = pool.filter(c => !state.usedComments[type].includes(c));
            if (available.length === 0) {
                state.usedComments[type] = [];
                available = pool;
            }
            let choice = available[Math.floor(Math.random() * available.length)];
            state.usedComments[type].push(choice);
            return choice;
        }

        function checkAnswer(correct) {
            if (state.isProcessing) return;
            state.isProcessing = true;
            clearInterval(state.timerInterval);
            const fScreen = document.getElementById('feedback-screen');
            const fContainer = document.getElementById('feedback-eye-container');
            const fEyeBase = document.getElementById('feedback-eye-base');
            const fMsg = document.getElementById('feedback-msg');

            fContainer.classList.remove('zoom-anim');
            
            if (correct) {
                state.score += 100;
                fEyeBase.src = './assets/images/ack_core_clean.png';
                let blinkCount = 0;
                const blinkInt = setInterval(() => {
                    fEyeBase.src = blinkCount % 2 === 0 ? './assets/images/ack_core_closed_clean.png' : './assets/images/ack_core_clean.png';
                    blinkCount++;
                    if (blinkCount > 3) clearInterval(blinkInt);
                }, 150);
                fMsg.style.borderColor = 'var(--neon)';
                fMsg.style.color = 'var(--neon)';
                fMsg.innerText = getComment('correct');
            } else {
                state.lives = Math.max(0, state.lives - 1); // Optimierte Fehlerbehandlung: Verhindert negative Werte
                document.getElementById("lives-display").innerText = state.lives; // UI-Update für Leben
                fEyeBase.src = './assets/images/ack_core_clean.png';
                fContainer.classList.add('zoom-anim');
                fMsg.style.borderColor = 'var(--error)';
                fMsg.style.color = 'var(--error)';
                fMsg.innerText = getComment('incorrect');
            }

            fScreen.classList.add('active');
            setTimeout(() => {
                fScreen.classList.remove('active');
                state.isProcessing = false;
                if (state.lives === 0) {
                    document.getElementById('start-screen').classList.add('active');
                    document.getElementById('game-screen').classList.remove('active');
                    document.getElementById('lives-display').innerText = state.lives;
                    endGame();
                } else {
                    state.current++;
                    renderQuestion();
                }
            }, 3500);
        }

        setInterval(() => {
            if (document.getElementById('start-screen').classList.contains('active')) {
                const eye = document.getElementById('core-eye');
                eye.src = './assets/images/ack_core_closed_clean.png';
                setTimeout(() => eye.src = './assets/images/ack_core_clean.png', 150);
            }
        }, 4000);

        document.addEventListener('keydown', (e) => {
            if (state.isPaused && !['Enter', ' ', 'Tab', 'Escape'].includes(e.key)) {
                state.cheatsAttempted = true;
            }
        });

        document.addEventListener('contextmenu', (e) => {
            if (state.isPaused) {
                e.preventDefault();
                state.cheatsAttempted = true;
            }
        });

        document.addEventListener('devtoolschange', () => {
            if (state.isPaused) state.cheatsAttempted = true;
        });
    </script>
</body>
</html>
