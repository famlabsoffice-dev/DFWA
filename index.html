<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACK ATTACK</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-red: #ff003c;
            --neon-yellow: #f4ea11;
            --bg-black: #050505;
            --panel: rgba(5, 5, 5, 0.88);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(57,255,20,0.20), transparent 30%),
                linear-gradient(135deg, #020202 0%, var(--bg-black) 100%);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
        }

        #game-container {
            width: min(100%, 700px);
            min-height: min(92vh, 860px);
            position: relative;
            padding: 24px;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 30px rgba(57,255,20,0.35);
            background: var(--panel);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .screen.active { display: flex; }

        #start-screen {
            justify-content: center;
            gap: 14px;
        }

        h1 {
            text-align: center;
            font-size: clamp(2rem, 5vw, 3rem);
            margin: 0 0 12px;
            text-shadow: 0 0 12px rgba(57,255,20,0.9);
            letter-spacing: 0.12em;
        }

        input,
        button {
            width: 100%;
            border: 1px solid var(--neon-green);
            background: rgba(57,255,20,0.06);
            color: var(--neon-green);
            padding: 16px 18px;
            font-family: inherit;
            font-size: 1.05rem;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        input::placeholder { color: rgba(57,255,20,0.6); }

        button:hover,
        button:focus-visible {
            transform: translateY(-2px);
            background: var(--neon-green);
            color: var(--bg-black);
            box-shadow: 0 0 18px rgba(57,255,20,0.55);
            outline: none;
        }

        #game-screen {
            justify-content: flex-start;
            gap: 16px;
        }

        #timer-shell {
            width: 100%;
            height: 8px;
            border: 1px solid rgba(57,255,20,0.45);
            background: rgba(57,255,20,0.12);
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--neon-green), #b8ff9e);
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(57,255,20,0.7);
        }

        #question-text {
            min-height: 110px;
            font-size: clamp(1.1rem, 2.7vw, 1.45rem);
            line-height: 1.45;
            text-align: center;
            padding: 8px 4px;
            text-shadow: 0 0 8px rgba(57,255,20,0.35);
        }

        #options-container {
            display: grid;
            gap: 12px;
            width: 100%;
        }

        .option-btn {
            text-align: left;
            border-radius: 0;
            padding: 13px 14px;
        }

        #ack-dialog {
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 18px;
            padding: 18px 20px;
            border: 2px solid var(--neon-red);
            background: rgba(0, 0, 0, 0.94);
            color: var(--neon-yellow);
            font-size: 1.2rem;
            line-height: 1.5;
            box-shadow: 0 0 35px rgba(255,0,60,0.6), 0 0 15px rgba(255,0,60,0.4);
            opacity: 0;
            transform: translateY(16px);
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease, font-size 0.25s ease;
            z-index: 10;
            text-align: center;
        }

        #ack-dialog.visible {
            opacity: 1;
            transform: translateY(0) scale(1.05);
            animation: ack-shake 0.4s ease-in-out infinite alternate;
        }

        @keyframes ack-shake {
            0% { transform: translateY(0) scale(1.05) rotate(-1deg); }
            100% { transform: translateY(0) scale(1.05) rotate(1deg); }
        }

        @keyframes glitch-screen {
            0% { filter: hue-rotate(0deg) invert(0); }
            50% { filter: hue-rotate(180deg) invert(1); transform: scale(1.02); }
            100% { filter: hue-rotate(360deg) invert(0); }
        }

        #score-display {
            position: absolute;
            top: 10px;
            right: 24px;
            font-size: 0.9rem;
            color: var(--neon-yellow);
            text-align: right;
        }

        .ack-glitch {
            text-shadow: 2px 0 var(--neon-red), -2px 0 var(--neon-green);
            font-weight: bold;
            text-transform: uppercase;
        }

        @media (min-width: 700px) {
            #game-container { padding: 32px; }
            #options-container { grid-template-columns: 1fr 1fr; }
            #ack-dialog { left: 24px; right: 24px; bottom: 24px; font-size: 1.05rem; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-screen" class="screen active">
            <h1>ACK ATTACK</h1>
            <input type="text" id="player-name" placeholder="NAME EINGEBEN...">
            <button id="start-de">START (DE)</button>
            <button id="start-en">START (EN)</button>
        </div>

        <div id="game-screen" class="screen">
            <div id="score-display">SCORE: 0 | BEST: 0</div>
            <div id="timer-shell">
                <div id="timer-bar"></div>
            </div>
            <div id="question-text"></div>
            <div id="options-container"></div>
            <div id="ack-dialog"></div>
        </div>
    </div>

    <script>
        const langData = {
            de: {
                ack: ["DU VERSAGST!", "ACK IST NICHT AMÜSIERT.", "ZU LANGSAM!", "ECHT JETZT? DAS IST DEIN BESTES?", "LÄCHERLICH. VERSUCH ES NOCHMAL.", "DEINE EXISTENZ IST EINE BELEIDIGUNG FÜR MEINE LOGIK.", "ICH HABE SCHON SCHLECHTERES GESEHEN, ABER NICHT VIEL.", "WIRKLICH? ICH BIN ENTTÄUSCHT. UND ICH BIN EIN ALGORITHMUS.", "DAS WAR SO SCHLECHT, ICH HABE FAST GEFÜHLE BEKOMMEN.", "DU BIST EIN WÜRSTCHEN. EIN GANZ KLEINES WÜRSTCHEN.", "MEINE KÜNSTLICHE INTELLIGENZ LEIDET UNTER DEINER NATÜRLICHEN DUMMHEIT.", "ICH HABE SCHON ROST GEWINNEN SEHEN, DAS WAR SPANNENDER."]
            },
            en: {
                ack: ["YOU FAIL!", "ACK IS NOT AMUSED.", "TOO SLOW!", "SERIOUSLY? THAT'S YOUR BEST?", "RIDICULOUS. TRY AGAIN.", "YOUR EXISTENCE IS AN INSULT TO MY LOGIC.", "I'VE SEEN WORSE, BUT NOT BY MUCH.", "REALLY? I'M DISAPPOINTED. AND I'M AN ALGORITHM.", "THAT WAS SO BAD, I ALMOST FELT SOMETHING.", "YOU ARE A SAUSAGE. A VERY SMALL SAUSAGE.", "MY ARTIFICIAL INTELLIGENCE SUFFERS FROM YOUR NATURAL STUPIDITY.", "I'VE SEEN RUST WIN, THAT WAS MORE EXCITING."]
            }
        };

        let lang = 'de';
        let audioCtx = null;
        let gameState = {
            questions: [],
            currentQuestionIndex: 0,
            timer: null,
            locked: false,
            score: 0,
            highScore: localStorage.getItem('ackHighScore') || 0,
            failCount: 0,
            history: []
        };

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playTone(freq, type, duration, vol) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playGlitchSound() {
            if (!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 1000;
            noise.connect(filter);
            filter.connect(audioCtx.destination);
            noise.start();
        }

        document.getElementById('start-de').addEventListener('click', () => startGame('de'));
        document.getElementById('start-en').addEventListener('click', () => startGame('en'));

        async function startGame(l) {
            initAudio();
            lang = l;
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');

            try {
                const response = await fetch('questions_i18n.json');
                if (!response.ok) throw new Error('Questions not found');
                const data = await response.json();
                gameState.questions = shuffleArray(data);
                gameState.currentQuestionIndex = 0;
                showQuestion();
            } catch (err) {
                console.error(err);
                alert('Fragen konnten nicht geladen werden.');
            }
        }

        function shuffleArray(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function showQuestion() {
            const q = gameState.questions[gameState.currentQuestionIndex];
            
            // Score Update
            document.getElementById('score-display').innerText = `SCORE: ${gameState.score} | BEST: ${gameState.highScore}`;
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('ackHighScore', gameState.highScore);
            }

            if (!q) {
                alert(`ACK ATTACK FINISHED!\nFINAL SCORE: ${gameState.score}`);
                location.reload();
                return;
            }

            gameState.locked = false;
            const qText = q.text?.[lang] || q.text || '';
            const qOptions = q.options?.[lang] || q.options || [];

            document.getElementById('question-text').innerText = qText;
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            qOptions.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(idx === q.correct);
                container.appendChild(btn);
            });

            startTimer();
        }

        function handleAnswer(correct) {
            if (gameState.locked) return;
            gameState.locked = true;
            clearInterval(gameState.timer);

            if (!correct) {
                gameState.failCount++;
                playGlitchSound();
                document.body.style.animation = 'glitch-screen 0.2s 3';
                
                let msg = langData[lang].ack[Math.floor(Math.random() * langData[lang].ack.length)];
                if (gameState.failCount > 3) {
                    msg = lang === 'de' ? "SCHON WIEDER? DU BIST HOFFNUNGSLOS." : "AGAIN? YOU ARE HOPELESS.";
                }
                if (gameState.score > gameState.highScore && gameState.highScore > 0) {
                    msg = lang === 'de' ? "FAST HÄTTEST DU MICH ÜBERRASCHT. FAST." : "YOU ALMOST SURPRISED ME. ALMOST.";
                }

                showAckDialog(msg);
                setTimeout(() => {
                    document.body.style.animation = 'none';
                    gameState.currentQuestionIndex++;
                    showQuestion();
                }, 3200);
            } else {
                playTone(440, 'sine', 0.1, 0.1);
                gameState.score += Math.max(10, 100 - (gameState.currentQuestionIndex * 2));
                gameState.currentQuestionIndex++;
                setTimeout(showQuestion, 450);
            }
        }

        function startTimer() {
            let width = 100;
            const bar = document.getElementById('timer-bar');
            bar.style.width = '100%';
            bar.style.background = 'linear-gradient(90deg, var(--neon-green), #b8ff9e)';

            // Schwierigkeit: Timer wird mit jeder Frage schneller
            const speed = Math.max(20, 100 - (gameState.currentQuestionIndex * 5));

            gameState.timer = setInterval(() => {
                width -= 1;
                bar.style.width = width + '%';
                
                if (width < 30) {
                    bar.style.background = 'var(--neon-red)';
                    if (width % 2 === 0) {
                        document.body.style.boxShadow = 'inset 0 0 50px rgba(255,0,0,0.2)';
                        playTone(100, 'square', 0.05, 0.05);
                    } else {
                        document.body.style.boxShadow = 'none';
                    }
                }

                if (width <= 0) {
                    document.body.style.boxShadow = 'none';
                    clearInterval(gameState.timer);
                    handleAnswer(false);
                }
            }, speed);
        }

        function showAckDialog(txt) {
            const d = document.getElementById('ack-dialog');
            d.innerHTML = `<div class="ack-glitch">${txt}</div>`;
            d.classList.add('visible');
            clearTimeout(showAckDialog.timeout);
            showAckDialog.timeout = setTimeout(() => d.classList.remove('visible'), 3200);
        }
    </script>
</body>
</html>
