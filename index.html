<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="./manifest.json">
    <title>ACK ATTACK - SYSTEM OVERRIDE</title>
    <style>
        :root {
            --neon: #39ff14;
            --neon-bg: rgba(57, 255, 20, 0.1);
            --error: #ff003c;
            --warning: #f4ea11;
            --cyber-blue: #00ffff;
            --black: #050505;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Courier New', monospace; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--black); color: var(--neon); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 1000;
        }
        .scanline {
            width: 100%; height: 100px; z-index: 1001; position: absolute;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(57, 255, 20, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1; pointer-events: none; animation: scan 6s linear infinite;
        }
        @keyframes scan { from { top: -100px; } to { top: 100%; } }

        #game-container {
            height: 100%; display: flex; flex-direction: column; padding: 20px;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            border: 2px solid var(--neon); margin: 10px; box-shadow: inset 0 0 50px rgba(57, 255, 20, 0.2);
            position: relative;
        }

        .screen { display: none; flex-direction: column; height: 100%; animation: flicker 0.15s infinite; }
        .screen.active { display: flex; }
        @keyframes flicker { 
            0% { opacity: 0.97; } 5% { opacity: 0.95; } 10% { opacity: 0.9; } 15% { opacity: 0.95; } 
            20% { opacity: 0.98; } 100% { opacity: 1; } 
        }

        h1 { font-size: 3rem; text-align: center; margin: 20px 0; letter-spacing: 5px; text-shadow: 0 0 10px var(--neon); }
        .glitch-text { animation: textGlitch 2s infinite; }
        @keyframes textGlitch {
            0% { transform: translate(0); } 2% { transform: translate(-2px, 2px); } 4% { transform: translate(2px, -2px); } 6% { transform: translate(0); }
        }

        #options-container { display: grid; gap: 15px; margin-top: auto; margin-bottom: 20px; }
        .option-btn {
            background: var(--neon-bg); border: 1px solid var(--neon); color: var(--neon);
            padding: 20px; font-size: 1.1rem; text-transform: uppercase; cursor: pointer;
            transition: 0.1s; position: relative; overflow: hidden;
        }
        .option-btn:hover { background: var(--neon); color: var(--black); box-shadow: 0 0 30px var(--neon); }

        #question-box {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 1.4rem; padding: 20px; border-bottom: 1px solid var(--neon-bg);
        }

        #timer-wrap { width: 100%; height: 5px; background: #222; margin-bottom: 10px; }
        #timer-fill { height: 100%; width: 100%; background: var(--neon); transition: width 0.1s linear; }

        /* ACK DIALOG - CENTERED & VISUALLY ENHANCED */
        #ack-overlay {
            position: fixed; top: 50%; left: 50%; width: 90%; max-width: 500px;
            padding: 40px; background: rgba(0, 0, 0, 0.98); 
            border: 4px solid var(--error); border-radius: 2px;
            transform: translate(-50%, -50%) scale(0); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000; text-align: center; box-shadow: 0 0 100px rgba(255, 0, 60, 0.6);
        }
        #ack-overlay.active { transform: translate(-50%, -50%) scale(1); }
        .ack-title { color: var(--error); font-weight: bold; font-size: 1.4rem; margin-bottom: 20px; text-shadow: 0 0 10px var(--error); }
        .ack-content { color: var(--warning); font-size: 1.8rem; text-transform: uppercase; line-height: 1.4; text-shadow: 0 0 15px var(--warning); }

        #score-panel { position: absolute; top: 10px; right: 20px; text-align: right; font-size: 0.8rem; opacity: 0.8; }

        #start-screen { justify-content: center; align-items: center; gap: 30px; }
        input { 
            background: transparent; border: none; border-bottom: 2px solid var(--neon);
            color: var(--neon); padding: 10px; font-size: 1.5rem; text-align: center; width: 80%; outline: none;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="scanline"></div>
    
    <div id="game-container">
        <div id="score-panel">SYSTEM_STATUS: ONLINE<br>BEST_RESULT: <span id="high-score">0</span></div>
        
        <div id="start-screen" class="screen active">
            <h1 class="glitch-text">ACK ATTACK</h1>
            <input type="text" id="user-id" placeholder="IDENTITÄT_EINGEBEN" maxlength="15">
            <button class="option-btn" onclick="initGame('de')">PROTOKOLL_STARTEN (DE)</button>
            <button class="option-btn" onclick="initGame('en')">START_PROTOCOL (EN)</button>
        </div>

        <div id="game-screen" class="screen">
            <div id="timer-wrap"><div id="timer-fill"></div></div>
            <div id="question-box">INITIALISIERE_DATENSATZ...</div>
            <div id="options-container"></div>
        </div>
    </div>

    <div id="ack-overlay">
        <div class="ack-title">>> SYSTEM_RESPONSE_ACK:</div>
        <div class="ack-content" id="ack-msg">DU VERSAGST!</div>
    </div>

    <script>
        let state = { lang: 'de', questions: [], current: 0, score: 0, best: localStorage.getItem('dfwa_best') || 0, timer: null, comments: {} };
        let used = new Set();

        async function initGame(l) {
            state.lang = l;
            document.getElementById('high-score').innerText = state.best;
            try {
                const [q, c] = await Promise.all([
                    fetch('questions_i18n.json?v=' + Date.now()), 
                    fetch('ack_comments.json?v=' + Date.now())
                ]);
                state.questions = (await q.json()).sort(() => Math.random() - 0.5);
                state.comments = await c.json();
                document.getElementById('start-screen').classList.remove('active');
                document.getElementById('game-screen').classList.add('active');
                renderQuestion();
            } catch (e) { alert('ERROR: DATA_CORRUPTION'); }
        }

        function renderQuestion() {
            const q = state.questions[state.current];
            if (!q) { alert('SYSTEM_CLEARED. SCORE: ' + state.score); location.reload(); return; }
            
            document.getElementById('question-box').innerText = q.text[state.lang];
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options[state.lang].forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i === q.correct);
                container.appendChild(btn);
            });
            startTimer();
        }

        function checkAnswer(correct) {
            clearInterval(state.timer);
            if (correct) {
                state.score += 100;
                if (state.score > state.best) { state.best = state.score; localStorage.setItem('dfwa_best', state.best); }
                state.current++;
                renderQuestion();
            } else {
                const pool = state.comments[state.lang].ack.filter(m => !used.has(m));
                if (pool.length === 0) used.clear();
                const msg = pool[Math.floor(Math.random() * pool.length)];
                used.add(msg);
                
                const overlay = document.getElementById('ack-overlay');
                document.getElementById('ack-msg').innerText = msg;
                overlay.classList.add('active');
                setTimeout(() => {
                    overlay.classList.remove('active');
                    state.current++;
                    renderQuestion();
                }, 2500);
            }
        }

        function startTimer() {
            let w = 100;
            const bar = document.getElementById('timer-fill');
            const speed = Math.max(10, 70 - (state.current * 2));
            state.timer = setInterval(() => {
                w -= 1; bar.style.width = w + '%';
                if (w <= 0) checkAnswer(false);
            }, speed);
        }

        // PWA Auto-Update logic
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    // Check for updates on load
                    reg.update();
                    reg.onupdatefound = () => {
                        const w = reg.installing;
                        w.onstatechange = () => { 
                            if (w.state === 'installed' && navigator.serviceWorker.controller) {
                                // Force reload to apply new version immediately
                                location.reload(); 
                            }
                        };
                    };
                });
            });
        }
    </script>
</body>
</html>
