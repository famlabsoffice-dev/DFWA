                    richtig: ["Sorte de principiante! Até um relógio parado acerta duas vezes.", "Uau, seu cérebro realmente funcionou. Estou chocado.", "Correto. Seu peixinho dourado te contou essa?", "Certo! Você pesquisou isso no Google?", "Bravo! Você é oficialmente mais inteligente que uma torradeira.", "Um milagre! A evolução não te ignorou completamente.", "Correto. Aproveite o momento, não vai durar.", "Certo. Quer um biscoito agora?"],
                    falsch: ["Burro? Ou apenas sem talento?", "Isso foi patético. Nota zero!", "Minha calculadora tem mehr personalidade e QI que você.", "Errado! Você deixou seu cérebro na cama hoje?", "Ai. Isso doeu de ver.", "Não! Você está tentando ganhar ou isso é algum tipo de arte performática?", "Errou! Você é a versão humana de um erro 404.", "Errado! Volte para o jardim de infância.", "Abismal. Simplesmente abismal.", "Tem certeza de que consegue respirar e pensar ao mesmo tempo?", "Errado! Sua pontuação está chorando agora.", "Sente-se. Isso foi embaraçoso.", "Até minha cafeteira sabia disso.", "Isso foi sério? Espero que não.", "Ponto deduzido! E um grande 'O QUÊ?' de mim."],
                    final: { win: "Me roubou!", mid: "Trocados.", lose: "Falido! HAHA!", debtRecord: "RECORDE!", debtBetter: "Pão-duro!" },
                    gambleWin: "MANIPULADO!", gambleLose: "PERDEU TUDO!", timeOut: "LENTO!", bribeAck: "Covarde!", bossWin: "VALEU... SÓ QUE NÃO!", bossLose: "PERDEDOR!", jackAttackWin: "MAESTRIA!", jackAttackLose: "CATÁSTROFE!"
                },
                market: [
                    { name: "EXTENSÃO DE TEMPO +10s", desc: "Ganhe 10 segundos extras por pergunta", price: 1500, effect: "timer" },
                    { name: "FILTRO ACK", desc: "Bloqueie os insultos de Ack por 3 perguntas", price: 3000, effect: "filter" },
                    { name: "SEGUNDA CHANCE", desc: "Ganhe uma resposta errada de graça", price: 2500, effect: "retry" },
                    { name: "DOBRADOR DE SCORE", desc: "Dobre seus próximos 5 pontos", price: 5000, effect: "multiplier" },
                    { name: "BLOQUEADOR DE SABOTAGEM", desc: "Previna a próxima sabotagem", price: 2000, effect: "sabotage_block" },
                    { name: "PEDRA DA SORTE", desc: "50% de chance de ignorar resposta errada", price: 3500, effect: "luck" }
                ],
                questions: [
                    {"text": "Se os sete anões formassem eine boy band, quem sempre esqueceria o microfone?", "options": ["Branca de Neve", "Tímido", "Soneca", "Brincalhão"], "correct": 2, "cat": "Conto Pop"}
                ]
            }
        };
        let lang = navigator.language.startsWith('de') ? 'de' : (navigator.language.startsWith('pt') ? 'pt' : 'en');
        let t = translations[lang];
        let gameState = { 
            playerName: "", currentQuestionIndex: 0, score: 0, activeQuestions: [], timer: null, timeLeft: 30,
            upgrades: { timer: 30, filter: 1 }, isBossMode: false, multiplier: 1, gambleStreak: 0, correctStreak: 0,
            badges: JSON.parse(localStorage.getItem('dfwa_badges')) || [], dailyPlayed: localStorage.getItem('dfwa_daily') === new Date().toISOString().slice(0,10),
            isJackAttackMode: false, jackAttackTerms: [], jackAttackAnswers: [], jackAttackScore: 0
        };
        
        function updateDystopiaUI() {
            const body = document.body; body.classList.remove('flicker');
            if (gameState.score >= 0) body.style.setProperty('--current-neon', 'var(--neon-green)');
            else if (gameState.score >= -5000) { body.style.setProperty('--current-neon', 'var(--neon-green)'); body.classList.add('flicker'); }
            else { body.style.setProperty('--current-neon', 'var(--neon-red)'); body.classList.add('flicker'); }
        }
        function triggerVisualFeedback(type) {
            const body = document.body; const container = document.getElementById('game-container');
            if (type === 'shake') { container.classList.add('shake'); setTimeout(() => container.classList.remove('shake'), 500); }
            if (type === 'flash') { body.classList.add('flash-red'); setTimeout(() => body.classList.remove('flash-red'), 200); }
            if (type === 'pulse') { container.classList.add('pulse'); setTimeout(() => container.classList.remove('pulse'), 600); }
        }
        function startGame(customSeed) {
            initAudio();
            sounds.start();
            seed = customSeed || Math.floor(Math.random() * 1000000);
            gameState.activeQuestions = shuffleArray([...t.questions]);
            gameState.isJackAttackMode = false;
            document.getElementById('start-screen').style.display = 'none'; document.getElementById('game-screen').style.display = 'block';
            gameState.playerName = document.getElementById('player-name').value || "ANON";
            gameState.currentQuestionIndex = 0;
            showQuestion();
        }
        function startDaily() {
            if(gameState.dailyPlayed) return alert("Bereits gespielt!");
            localStorage.setItem('dfwa_daily', new Date().toISOString().slice(0,10));
            startGame(parseInt(new Date().toISOString().slice(0,10).replace(/-/g, "")));
        }
        function showChallengeInput() { document.getElementById('challenge-overlay').style.display = 'block'; }
        function toggleChallenge(show) { document.getElementById('challenge-overlay').style.display = show ? 'block' : 'none'; }
        function importChallenge() {
            const code = document.getElementById('challenge-input').value;
            try { const data = JSON.parse(atob(code)); startGame(data.seed); toggleChallenge(false); } catch(e) { alert("Ungültiger Code!"); }
        }
        function showQuestion() {
            updateDystopiaUI(); document.getElementById('question-container').classList.remove('mirror', 'upside-down', 'blackout');
            const q = gameState.activeQuestions[gameState.currentQuestionIndex]; 
            if (!q) { startJackAttack(); return; }
            if(gameState.currentQuestionIndex >= 5 && Math.random() < 0.2) {
                const sab = Math.floor(Math.random() * 3);
                if(sab === 0) { document.getElementById('question-container').classList.add('mirror'); showAckDialog(t.ui.sabotage + " " + t.ui.mirror); }
                else if(sab === 1) { showAckDialog(t.ui.sabotage + " " + t.ui.swap); }
                else { setTimeout(() => document.getElementById('question-container').classList.add('blackout'), 2000); showAckDialog(t.ui.sabotage + " " + t.ui.blackout); }
            }
            document.getElementById('question-text').innerText = q.text;
            const container = document.getElementById('options-container'); container.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button'); btn.innerText = opt; btn.onclick = () => { sounds.click(); handleAnswer(idx); }; container.appendChild(btn);
            });
            startTimer();
        }
        function handleAnswer(idx) {
            stopTimer(); const q = gameState.activeQuestions[gameState.currentQuestionIndex];
            if(idx === q.correct) { gameState.score += 1000; sounds.correct(); showAckDialog(t.ack.richtig[Math.floor(Math.random() * t.ack.richtig.length)]); triggerVisualFeedback('pulse'); }
            else { gameState.score -= 1000; sounds.wrong(); triggerVisualFeedback('shake'); triggerVisualFeedback('flash'); showAckDialog(t.ack.falsch[Math.floor(Math.random() * t.ack.falsch.length)]); }
            gameState.currentQuestionIndex++; updateScore(); setTimeout(showQuestion, 1500);
        }
        function startTimer() {
            gameState.timeLeft = 30; document.getElementById('timer-bar-container').style.display = 'block';
            gameState.timer = setInterval(() => {
                gameState.timeLeft -= 0.1; document.getElementById('timer-bar').style.width = (gameState.timeLeft / 30 * 100) + '%';
                if(gameState.timeLeft <= 0) { stopTimer(); handleAnswer(-1); }
            }, 100);
        }
        function stopTimer() { clearInterval(gameState.timer); document.getElementById('timer-bar-container').style.display = 'none'; }
        function updateScore() { document.getElementById('score-display').innerText = "SCORE: $" + gameState.score; }
        function showAckDialog(txt) { document.getElementById('ack-dialog').innerText = "ACK: " + txt; }
        function startJackAttack() {
            gameState.isJackAttackMode = true;
            gameState.jackAttackScore = 0;
            const jackAttackQuestions = [
                { left: "Banane", right: "Gelb", answer: 0 },
                { left: "Himmel", right: "Blau", answer: 0 },
                { left: "Feuer", right: "Heiß", answer: 0 },
                { left: "Schnee", right: "Kalt", answer: 0 },
                { left: "Gras", right: "Grün", answer: 0 }
            ];
            const shuffledQuestions = shuffleArray([...jackAttackQuestions]);
            playJackAttackRound(shuffledQuestions, 0);
        }
        function playJackAttackRound(questions, index) {
            if (index >= questions.length) { endJackAttack(); return; }
            const q = questions[index];
            const container = document.getElementById('question-container');
            container.innerHTML = `
                <div class="jack-attack-container">
                    <h1 style="color: var(--neon-yellow);">${t.ui.jackAttack}</h1>
                    <p>${t.ui.jackAttackDesc}</p>
                    <div class="jack-attack-term">${q.left}</div>
                    <div class="jack-attack-options">
                        <button onclick="jackAttackAnswer(${index}, 0, ${questions.length})">${q.right}</button>
                        <button onclick="jackAttackAnswer(${index}, 1, ${questions.length})">FALSCH</button>
                    </div>
                </div>
            `;
            showAckDialog(t.ui.jackAttack + "!");
            triggerVisualFeedback('pulse');
            gameState.jackAttackTerms = questions;
        }
        function jackAttackAnswer(index, answer, total) {
            const q = gameState.jackAttackTerms[index];
            if (answer === q.answer) {
                gameState.jackAttackScore += 500;
                sounds.correct();
                showAckDialog("RICHTIG!");
                triggerVisualFeedback('pulse');
            } else {
                gameState.jackAttackScore -= 500;
                sounds.wrong();
                showAckDialog("FALSCH!");
                triggerVisualFeedback('shake');
            }
            gameState.score += gameState.jackAttackScore;
            updateScore();
            setTimeout(() => playJackAttackRound(gameState.jackAttackTerms, index + 1), 1000);
        }
        function endJackAttack() { endGame(); }
        function endGame() {
            const code = btoa(JSON.stringify({ seed: seed, score: gameState.score }));
            document.getElementById('question-container').innerHTML = `<h1>GAME OVER</h1><h2>SCORE: $${gameState.score}</h2><p class="small-text">${t.ui.code}${code}</p><button onclick="location.reload()">NEUSTART</button>`;
        }
        function toggleMarket(show) {
            if (show) {
                const marketContainer = document.getElementById('market-items');
                marketContainer.innerHTML = '';
                t.market.forEach((item, idx) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'market-item';
                    itemDiv.innerHTML = `
                        <div class="market-item-title">${item.name}</div>
                        <div class="market-item-desc">${item.desc}</div>
                        <div class="market-item-price">$${item.price}</div>
                        <button onclick="buyItem(${idx})" ${gameState.score < item.price ? 'disabled' : ''}>KAUFEN</button>
                    `;
                    marketContainer.appendChild(itemDiv);
                });
            }
            document.getElementById('market-overlay').style.display = show ? 'block' : 'none';
        }
        function buyItem(idx) {
            const item = t.market[idx];
            if (gameState.score >= item.price) {
                gameState.score -= item.price;
                updateScore();
                showAckDialog("VERKAUFT! " + item.effect.toUpperCase());
                sounds.correct();
                toggleMarket(false);
            } else {
                showAckDialog("ZU ARM!");
                sounds.wrong();
            }
        }
        function bribeAck() {
            if (gameState.score >= 2000) {
                gameState.score -= 2000;
                updateScore();
                const q = gameState.activeQuestions[gameState.currentQuestionIndex];
                const correctAnswer = q.options[q.correct];
                showAckDialog(t.ack.bribeAck + " - ANTWORT: " + correctAnswer);
                sounds.correct();
                triggerVisualFeedback('pulse');
                gameState.currentQuestionIndex++;
                setTimeout(showQuestion, 2000);
            } else {
                showAckDialog("ZU ARM!");
                sounds.wrong();
            }
        }
        function gamble() { showAckDialog(t.ack.gambleWin); }
        
        // Registrierung des Service Workers für PWA (absoluter Pfad auf './')
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW registered:', reg);
                }).catch(err => {
                    console.log('SW failed:', err);
                });
            });
        }

        console.log("DFWA Initialized");
    </script>
</body>
</html>
