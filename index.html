<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="./manifest.json">
    <title>ACK ATTACK - SYSTEM OVERRIDE</title>
    <style>
        :root {
            --neon: #39ff14;
            --neon-bg: rgba(57, 255, 20, 0.15);
            --error: #ff003c;
            --warning: #f4ea11;
            --cyber-blue: #00d2ff;
            --black: #000000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Courier New', monospace; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--black); color: var(--neon);
            display: flex; align-items: center; justify-content: center;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 1000;
        }
        .scanline {
            width: 100%; height: 100px; z-index: 1001; position: absolute;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(57, 255, 20, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1; pointer-events: none; animation: scan 6s linear infinite;
        }
        @keyframes scan { from { top: -100px; } to { top: 100%; } }

        #game-container {
            width: calc(100% - 20px); height: calc(100% - 20px);
            display: flex; flex-direction: column; padding: 15px;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            border: 2px solid var(--neon); box-shadow: inset 0 0 30px rgba(57, 255, 20, 0.2);
            position: relative; overflow: hidden;
        }

        .screen { display: none; flex-direction: column; height: 100%; animation: flicker 0.15s infinite; }
        .screen.active { display: flex; }
        @keyframes flicker { 
            0% { opacity: 0.97; } 5% { opacity: 0.95; } 10% { opacity: 0.9; } 15% { opacity: 0.95; } 
            20% { opacity: 0.98; } 100% { opacity: 1; } 
        }

        h1 { font-size: 3rem; text-align: center; margin: 10px 0; letter-spacing: 5px; text-shadow: 0 0 10px var(--neon); }
        .glitch-text { animation: textGlitch 2s infinite; }
        @keyframes textGlitch {
            0% { transform: translate(0); } 2% { transform: translate(-2px, 2px); } 4% { transform: translate(2px, -2px); } 6% { transform: translate(0); }
        }

        #options-container { display: grid; gap: 12px; margin-top: auto; margin-bottom: 10px; }
        .option-btn {
            background: var(--neon-bg); border: 2px solid var(--neon); color: var(--neon);
            padding: 18px; font-size: 1rem; text-transform: uppercase; cursor: pointer;
            transition: 0.2s; position: relative; overflow: hidden;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.1);
            font-weight: bold;
        }
        .option-btn:hover, .option-btn:focus-visible { 
            background: var(--neon); color: var(--black); box-shadow: 0 0 25px var(--neon);
            outline: none; transform: translateY(-2px);
        }
        
        .start-btn { border-color: var(--cyber-blue); color: var(--cyber-blue); background: rgba(0, 210, 255, 0.1); margin-top: 5px; }
        .start-btn:hover { background: var(--cyber-blue); color: var(--black); box-shadow: 0 0 25px var(--cyber-blue); }

        .battle-btn { border-color: var(--warning); color: var(--warning); background: rgba(244, 234, 17, 0.1); margin-top: 5px; }
        .battle-btn:hover { background: var(--warning); color: var(--black); box-shadow: 0 0 25px var(--warning); }

        #question-box { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 1.3rem; padding: 15px; border-bottom: 1px solid var(--neon-bg); }
        #timer-wrap { width: 100%; height: 4px; background: #222; margin-bottom: 8px; }
        #timer-fill { height: 100%; width: 100%; background: var(--neon); transition: width 0.1s linear; }

        #ack-overlay {
            position: fixed; top: 50%; left: 50%; width: 90%; max-width: 500px;
            padding: 35px; background: rgba(0, 0, 0, 0.98); 
            border: 4px solid var(--neon); border-radius: 2px;
            transform: translate(-50%, -50%) scale(0); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000; text-align: center;
        }
        #ack-overlay.active { transform: translate(-50%, -50%) scale(1); }
        #ack-overlay.correct { border-color: var(--neon); box-shadow: 0 0 100px rgba(57, 255, 20, 0.6); }
        #ack-overlay.correct .ack-title { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        #ack-overlay.incorrect { border-color: var(--error); box-shadow: 0 0 100px rgba(255, 0, 60, 0.6); animation: shake 0.5s; }
        #ack-overlay.incorrect .ack-title { color: var(--error); text-shadow: 0 0 10px var(--error); }

        @keyframes shake {
            0%, 100% { transform: translate(-50%, -50%); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-52%, -50%); }
            20%, 40% { transform: translate(-48%, -50%); }
        }

        .ack-title { font-weight: bold; font-size: 1.3rem; margin-bottom: 15px; }
        .ack-content { font-size: 1.6rem; text-transform: uppercase; line-height: 1.3; }

        #score-panel { position: absolute; top: 10px; right: 15px; text-align: right; font-size: 0.75rem; opacity: 0.8; z-index: 100; line-height: 1.4; }
        #lives-display { color: var(--error); font-weight: bold; }
        #battle-status { color: var(--warning); font-weight: bold; display: none; }

        .cyber-select, .cyber-input { background: #000; border: 2px solid var(--neon); padding: 12px; width: 100%; margin: 8px 0; font-weight: bold; color: var(--neon); }
        .cyber-input { border-color: var(--cyber-blue); color: var(--cyber-blue); }

        #leaderboard-list { list-style: none; padding: 0; font-size: 0.75rem; color: var(--cyber-blue); }
        .subtitle-text { color: var(--cyber-blue); text-shadow: 0 0 10px var(--cyber-blue); letter-spacing: 3px; font-weight: bold; font-size: 0.9rem; }

        #game-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(8px); z-index: 3000;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .overlay-content { border: 2px solid var(--neon); padding: 30px; text-align: center; max-width: 90%; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="scanline"></div>
    
    <div id="game-container">
        <div id="score-panel" aria-live="polite">
            SYSTEM_STATUS: ONLINE<br>
            PLAYER: <span id="player-display">GUEST</span><br>
            ID: <span id="id-display">0000</span><br>
            LIVES: <span id="lives-display">3</span><br>
            BEST: <span id="high-score">0</span><br>
            <div id="battle-status">BATTLE_SYNC: ACTIVE</div>
        </div>
        
        <div id="start-screen" class="screen active" style="justify-content: flex-start; align-items: center; padding-top: 3vh;">
            <div style="text-align: center; position: relative; z-index: 10; width: 100%; max-width: 600px;">
                <h1 class="glitch-text" style="font-size: clamp(2.5rem, 10vw, 4.5rem); margin-bottom: 1vh;">A.C.K.</h1>
                <div id="eye-container" style="width: min(70vw, 350px); height: min(70vw, 350px); margin: 0 auto 1.5vh; position: relative;">
                    <img id="core-eye" src="./assets/images/ack_core.png" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 20px var(--neon));">
                </div>
                <p class="subtitle-text">AUTONOMOUS CYBERNETIC KNOWLEDGE</p>
                <div class="cyber-box" style="text-align:center; width: 90%; max-width: 380px; margin: 0 auto;">
                    <input type="text" id="player-name" class="cyber-input" placeholder="ENTER_CODENAME" maxlength="12">
                    <select id="category-filter" class="cyber-select"><option value="all">ALL_SECTORS</option></select>
                    <div style="display: grid; gap: 8px; margin-top: 10px;">
                        <button id="start-btn" class="option-btn start-btn" onclick="initGame()">INIT_PROTOCOL</button>
                        <button id="lobby-btn" class="option-btn battle-btn" onclick="showLobby()">BATTLE_LOBBY</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="lobby-screen" class="screen" style="justify-content: center; align-items: center;">
            <div style="text-align: center; width: 90%; max-width: 400px;">
                <h2 style="color: var(--warning);">BATTLE_OVERRIDE</h2>
                <input type="text" id="room-code" class="cyber-input" style="border-color: var(--warning); color: var(--warning);" placeholder="ENTER_ROOM_CODE" maxlength="6">
                <div style="display: grid; gap: 10px; margin-top: 20px;">
                    <button class="option-btn battle-btn" onclick="joinBattle()">JOIN_BATTLE</button>
                    <button class="option-btn start-btn" onclick="createBattle()">CREATE_ROOM</button>
                    <button class="option-btn" style="border-color: #555; color: #555;" onclick="hideLobby()">CANCEL</button>
                </div>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div id="timer-wrap"><div id="timer-fill"></div></div>
            <div id="question-box" role="status">INITIALISIERE_DATENSATZ...</div>
            <div id="options-container" role="radiogroup"></div>
        </div>
    </div>

    <div id="ack-overlay">
        <div class="ack-title" id="ack-header">>> SYSTEM_RESPONSE_ACK:</div>
        <div class="ack-content" id="ack-msg">DU VERSAGST!</div>
    </div>

    <div id="game-overlay">
        <div class="overlay-content">
            <h2 id="overlay-title">SYSTEM_HALT</h2>
            <p id="overlay-message"></p>
            <ul id="leaderboard-list"></ul>
            <button onclick="location.reload()" class="option-btn">REBOOT_SYSTEM</button>
        </div>
    </div>

    <script>
        let state = { 
            lang: 'de', questions: [], current: 0, score: 0, streak: 0, lives: 3,
            playerName: localStorage.getItem('dfwa_name') || 'GUEST',
            playerId: localStorage.getItem('dfwa_id') || Math.floor(1000 + Math.random() * 9000).toString(),
            best: parseInt(localStorage.getItem('dfwa_best') || 0),
            leaderboard: JSON.parse(localStorage.getItem('dfwa_leaderboard') || "[]"),
            timer: null, comments: {}, selectedCat: 'all',
            isBattle: false, roomCode: ''
        };

        function detectLanguage() {
            const userLang = navigator.language || navigator.userLanguage;
            state.lang = userLang.startsWith('de') ? 'de' : 'en';
            document.documentElement.lang = state.lang;
            document.getElementById('start-btn').innerText = state.lang === 'de' ? 'PROTOKOLL_STARTEN' : 'INIT_PROTOCOL';
        }
        detectLanguage();

        document.getElementById('player-name').value = state.playerName === 'GUEST' ? '' : state.playerName;
        document.getElementById('player-display').innerText = state.playerName;
        document.getElementById('id-display').innerText = state.playerId;
        document.getElementById('high-score').innerText = state.best;
        localStorage.setItem('dfwa_id', state.playerId);

        function blink() {
            const eye = document.getElementById('core-eye');
            if (!eye) return;
            eye.src = './assets/images/ack_core_closed.png';
            setTimeout(() => { eye.src = './assets/images/ack_core.png'; }, 150 + Math.random() * 100);
            setTimeout(blink, 2000 + Math.random() * 5000);
        }
        setTimeout(blink, 3000);

        function showLobby() {
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('lobby-screen').classList.add('active');
        }
        function hideLobby() {
            document.getElementById('lobby-screen').classList.remove('active');
            document.getElementById('start-screen').classList.add('active');
        }

        function createBattle() {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('room-code').value = code;
        }

        function joinBattle() {
            const code = document.getElementById('room-code').value.trim();
            if (code.length < 4) return;
            state.isBattle = true;
            state.roomCode = code;
            document.getElementById('battle-status').style.display = 'block';
            initGame();
        }

        async function initGame() {
            state.selectedCat = document.getElementById('category-filter').value;
            state.playerName = document.getElementById('player-name').value.trim() || 'GUEST';
            localStorage.setItem('dfwa_name', state.playerName);
            document.getElementById('player-display').innerText = state.playerName;
            state.lives = 3;
            document.getElementById('lives-display').innerText = state.lives;
            
            try {
                const [qRes, cRes] = await Promise.all([
                    fetch('questions_i18n.json?v=' + Date.now()), 
                    fetch('ack_comments.json?v=' + Date.now())
                ]);
                let allQ = await qRes.json();
                state.comments = await cRes.json();
                state.questions = state.selectedCat === 'all' ? allQ : allQ.filter(q => q.cat === state.selectedCat);
                
                if (state.isBattle) {
                    const seed = state.roomCode.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
                    let m = state.questions.length, t, i;
                    while (m) {
                        i = Math.floor((Math.abs(Math.sin(seed + m))) * m--);
                        t = state.questions[m]; state.questions[m] = state.questions[i]; state.questions[i] = t;
                    }
                } else {
                    state.questions.sort(() => Math.random() - 0.5);
                }

                document.getElementById('start-screen').classList.remove('active');
                document.getElementById('lobby-screen').classList.remove('active');
                document.getElementById('game-screen').classList.add('active');
                renderQuestion();
            } catch (e) { console.error(e); }
        }

        function renderQuestion() {
            const q = state.questions[state.current];
            if (!q) return finishGame(true, state.lang === 'de' ? "DATENSATZ_ABSORBIERT." : "DATA_ABSORBED.");
            document.getElementById('question-box').innerText = q.text[state.lang];
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options[state.lang].forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i === q.correct);
                container.appendChild(btn);
            });
            startTimer();
        }

        function checkAnswer(correct) {
            clearInterval(state.timer);
            const overlay = document.getElementById('ack-overlay');
            const header = document.getElementById('ack-header');
            const msgBox = document.getElementById('ack-msg');
            overlay.classList.remove('correct', 'incorrect');
            
            if (correct) {
                state.score += 100 + (state.streak++ * 10);
                const pool = state.comments[state.lang].correct;
                msgBox.innerText = pool[Math.floor(Math.random() * pool.length)];
                header.innerText = ">> [SUCCESS_ACK]:";
                overlay.classList.add('correct', 'active');
                setTimeout(() => { overlay.classList.remove('active'); state.current++; renderQuestion(); }, 2500);
            } else {
                state.lives--;
                state.streak = 0;
                document.getElementById('lives-display').innerText = state.lives;
                const pool = state.comments[state.lang].incorrect;
                msgBox.innerText = pool[Math.floor(Math.random() * pool.length)];
                header.innerText = ">> [CRITICAL_ERROR]:";
                overlay.classList.add('incorrect', 'active');
                setTimeout(() => {
                    overlay.classList.remove('active');
                    if (state.lives <= 0) finishGame(false, "SYSTEM_FAILURE.");
                    else { state.current++; renderQuestion(); }
                }, 3000);
            }
        }

        function finishGame(victory, msg) {
            clearInterval(state.timer);
            const overlay = document.getElementById('game-overlay');
            document.getElementById('overlay-title').innerText = victory ? "VICTORY" : "GAME_OVER";
            document.getElementById('overlay-message').innerText = msg;
            state.leaderboard.push({name: state.playerName, id: state.playerId, score: state.score, date: new Date().toLocaleDateString()});
            state.leaderboard.sort((a,b) => b.score - a.score);
            state.leaderboard = state.leaderboard.slice(0, 5);
            localStorage.setItem('dfwa_leaderboard', JSON.stringify(state.leaderboard));
            document.getElementById('leaderboard-list').innerHTML = state.leaderboard.map(e => `<li>${e.score} PTS - ${e.name} (#${e.id})</li>`).join('');
            overlay.style.display = 'flex';
        }

        function startTimer() {
            let w = 100;
            const bar = document.getElementById('timer-fill');
            const speed = Math.max(10, 70 - (state.current * 2));
            state.timer = setInterval(() => {
                w -= 1; bar.style.width = w + '%';
                if (w <= 0) checkAnswer(false);
            }, speed);
        }

        fetch('questions_i18n.json').then(r => r.json()).then(qs => {
            const cats = [...new Set(qs.map(q => q.cat))];
            const select = document.getElementById('category-filter');
            cats.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.innerText = c.toUpperCase();
                select.appendChild(opt);
            });
        });
    </script>
</body>
</html>
