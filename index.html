<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACK ATTACK</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-red: #ff003c;
            --neon-yellow: #f4ea11;
            --bg-black: #050505;
            --panel: rgba(5, 5, 5, 0.88);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(57,255,20,0.20), transparent 30%),
                linear-gradient(135deg, #020202 0%, var(--bg-black) 100%);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
        }

        #game-container {
            width: min(100%, 700px);
            min-height: min(92vh, 860px);
            position: relative;
            padding: 24px;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 30px rgba(57,255,20,0.35);
            background: var(--panel);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .screen.active { display: flex; }

        #start-screen {
            justify-content: center;
            gap: 14px;
        }

        h1 {
            text-align: center;
            font-size: clamp(2rem, 5vw, 3rem);
            margin: 0 0 12px;
            text-shadow: 0 0 12px rgba(57,255,20,0.9);
            letter-spacing: 0.12em;
        }

        input,
        button {
            width: 100%;
            border: 1px solid var(--neon-green);
            background: rgba(57,255,20,0.06);
            color: var(--neon-green);
            padding: 16px 18px;
            font-family: inherit;
            font-size: 1.05rem;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        input::placeholder { color: rgba(57,255,20,0.6); }

        button:hover,
        button:focus-visible {
            transform: translateY(-2px);
            background: var(--neon-green);
            color: var(--bg-black);
            box-shadow: 0 0 18px rgba(57,255,20,0.55);
            outline: none;
        }

        #game-screen {
            justify-content: flex-start;
            gap: 16px;
        }

        #timer-shell {
            width: 100%;
            height: 8px;
            border: 1px solid rgba(57,255,20,0.45);
            background: rgba(57,255,20,0.12);
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--neon-green), #b8ff9e);
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(57,255,20,0.7);
        }

        #question-text {
            min-height: 110px;
            font-size: clamp(1.1rem, 2.7vw, 1.45rem);
            line-height: 1.45;
            text-align: center;
            padding: 8px 4px;
            text-shadow: 0 0 8px rgba(57,255,20,0.35);
        }

        #options-container {
            display: grid;
            gap: 12px;
            width: 100%;
        }

        .option-btn {
            text-align: left;
            border-radius: 0;
            padding: 13px 14px;
        }

        #ack-dialog {
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 18px;
            padding: 14px 16px;
            border: 1px solid var(--neon-yellow);
            background: rgba(0, 0, 0, 0.94);
            color: var(--neon-yellow);
            font-size: 1rem;
            line-height: 1.5;
            box-shadow: 0 0 25px rgba(244,234,17,0.2);
            opacity: 0;
            transform: translateY(16px);
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 10;
            text-align: center;
        }

        #ack-dialog.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (min-width: 700px) {
            #game-container { padding: 32px; }
            #options-container { grid-template-columns: 1fr 1fr; }
            #ack-dialog { left: 24px; right: 24px; bottom: 24px; font-size: 1.05rem; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-screen" class="screen active">
            <h1>ACK ATTACK</h1>
            <input type="text" id="player-name" placeholder="NAME EINGEBEN...">
            <button id="start-de">START (DE)</button>
            <button id="start-en">START (EN)</button>
        </div>

        <div id="game-screen" class="screen">
            <div id="timer-shell">
                <div id="timer-bar"></div>
            </div>
            <div id="question-text"></div>
            <div id="options-container"></div>
            <div id="ack-dialog"></div>
        </div>
    </div>

    <script>
        const langData = {
            de: {
                ack: ["DU VERSAGST!", "ACK IST NICHT AMÜSIERT.", "ZU LANGSAM!"]
            },
            en: {
                ack: ["YOU FAIL!", "ACK IS NOT AMUSED.", "TOO SLOW!"]
            }
        };

        let lang = 'de';
        let gameState = {
            questions: [],
            currentQuestionIndex: 0,
            timer: null,
            locked: false
        };

        document.getElementById('start-de').addEventListener('click', () => startGame('de'));
        document.getElementById('start-en').addEventListener('click', () => startGame('en'));

        async function startGame(l) {
            lang = l;
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');

            try {
                const response = await fetch('questions_i18n.json');
                if (!response.ok) throw new Error('Questions not found');
                const data = await response.json();
                gameState.questions = shuffleArray(data);
                gameState.currentQuestionIndex = 0;
                showQuestion();
            } catch (err) {
                console.error(err);
                alert('Fragen konnten nicht geladen werden.');
            }
        }

        function shuffleArray(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function showQuestion() {
            const q = gameState.questions[gameState.currentQuestionIndex];
            if (!q) {
                alert('ACK ATTACK FINISHED!');
                location.reload();
                return;
            }

            gameState.locked = false;
            const qText = q.text?.[lang] || q.text || '';
            const qOptions = q.options?.[lang] || q.options || [];

            document.getElementById('question-text').innerText = qText;
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            qOptions.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(idx === q.correct);
                container.appendChild(btn);
            });

            startTimer();
        }

        function handleAnswer(correct) {
            if (gameState.locked) return;
            gameState.locked = true;
            clearInterval(gameState.timer);

            if (!correct) {
                showAckDialog(langData[lang].ack[Math.floor(Math.random() * langData[lang].ack.length)]);
                setTimeout(() => {
                    gameState.currentQuestionIndex++;
                    showQuestion();
                }, 3000);
            } else {
                gameState.currentQuestionIndex++;
                setTimeout(showQuestion, 450);
            }
        }

        function startTimer() {
            let width = 100;
            const bar = document.getElementById('timer-bar');
            bar.style.width = '100%';

            gameState.timer = setInterval(() => {
                width -= 1;
                bar.style.width = width + '%';
                if (width <= 0) {
                    clearInterval(gameState.timer);
                    handleAnswer(false);
                }
            }, 100);
        }

        function showAckDialog(txt) {
            const d = document.getElementById('ack-dialog');
            d.innerText = txt;
            d.classList.add('visible');
            clearTimeout(showAckDialog.timeout);
            showAckDialog.timeout = setTimeout(() => d.classList.remove('visible'), 2800);
        }
    </script>
</body>
</html>
