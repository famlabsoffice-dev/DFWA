        body { background: var(--bg-black); color: var(--neon-green); font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 100%; max-width: 600px; height: 100vh; position: relative; padding: 20px; border: 2px solid var(--neon-green); box-shadow: 0 0 20px var(--neon-green); display: flex; flex-direction: column; }
        .screen { display: none; flex-direction: column; height: 100%; }
        .screen.active { display: flex; }
        h1 { text-align: center; font-size: 2.5rem; text-shadow: 0 0 10px var(--neon-green); margin-bottom: 30px; }
        input, button { background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 15px; font-family: inherit; font-size: 1.2rem; margin-bottom: 15px; width: 100%; cursor: pointer; }

        #question-text { font-size: 1.5rem; margin-bottom: 30px; text-align: center; min-height: 100px; }
        #options-container { display: grid; grid-template-columns: 1fr; gap: 10px; }
        #timer-bar { height: 5px; background: var(--neon-green); width: 100%; margin-bottom: 20px; transition: width 0.1s linear; }
        #ack-dialog { position: absolute; bottom: 20px; left: 20px; right: 20px; border: 1px solid var(--neon-yellow); padding: 10px; background: rgba(0,0,0,0.8); font-size: 0.9rem; color: var(--neon-yellow); display: none; }
        .mirror { transform: scaleX(-1); }
        .blackout { filter: brightness(0); }
        @keyframes ackAttackPulse { 0% { box-shadow: 0 0 20px var(--neon-red); } 50% { box-shadow: 0 0 50px var(--neon-red); } 100% { box-shadow: 0 0 20px var(--neon-red); } }
        .ack-attack { animation: ackAttackPulse 0.5s infinite; border-color: var(--neon-red) !important; color: var(--neon-red) !important; }

        let lang = 'de';
        let gameState = { activeQuestions: [], currentQuestionIndex: 0, timer: null };

        function startGame(l) {
            lang = l;
            gameState.activeQuestions = questions.sort(() => 0.5 - Math.random());
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            const q = gameState.activeQuestions[gameState.currentQuestionIndex];
            if (!q) { alert("ACK ATTACK FINISHED!"); location.reload(); return; }
            
            const qText = q.text[lang] || q.text;
            const qOptions = q.options[lang] || q.options;
            document.getElementById('question-text').innerText = qText;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            qOptions.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(idx === q.correct);
                container.appendChild(btn);
            });
            startTimer();
        }

        function handleAnswer(correct) {
            clearInterval(gameState.timer);
            if (!correct) showAckDialog(langData[lang].ack[Math.floor(Math.random() * 3)]);
            gameState.currentQuestionIndex++;
            setTimeout(showQuestion, 1000);
        }

        function startTimer() {
            let width = 100;
            const bar = document.getElementById('timer-bar');
            gameState.timer = setInterval(() => {
                width -= 1;
                bar.style.width = width + '%';
                if (width <= 0) { clearInterval(gameState.timer); handleAnswer(false); }
            }, 100);
        }

        function showAckDialog(txt) {
            const d = document.getElementById('ack-dialog');
            d.innerText = txt;
            d.style.display = 'block';
            setTimeout(() => d.style.display = 'none', 2000);
        }
