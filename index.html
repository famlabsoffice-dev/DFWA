<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ACK ATTACK">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./style.css">
    <title>ACK ATTACK - SYSTEM OVERRIDE</title>
</head>
<body>
    <div id="game-container">
        <h1>A.C.K.</h1>
        <div id="start-screen" class="screen active">
            <div id="eye-bg-container">
                <img id="core-eye" src="./assets/images/ack_core_clean.png">
                <div id="stat-player" class="stat-overlay">USER_IDENT//<br><span id="player-display">GUEST</span></div>
                <div id="stat-lives" class="stat-overlay">VITAL_SIGNS//<br><span id="lives-display">3</span>_UNITS</div>
                <div id="stat-id" class="stat-overlay">CORE_LINK//<br>#<span id="id-display">0000</span></div>
                <div id="stat-best" class="stat-overlay">PEAK_DATA//<br><span id="high-score">0</span>_PTS</div>
            </div>
            <div class="ui-content-wrapper">
                <button id="start-btn" class="option-btn start-btn">INIT_PROTOCOL</button>
                <button id="lobby-btn" class="option-btn battle-btn">BATTLE_LOBBY</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div id="timeline-container"><div id="timeline-bar"></div></div>
            <div id="question-box" role="status">SYSTEM_READY...</div>
            <div id="options-container"></div>
            <button id="pause-btn">PAUSE</button>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        };
                    };
                });
            });
        }
    </script>
</body>
</html>
