<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="./manifest.json">
    <title>ACK ATTACK - SYSTEM OVERRIDE</title>
    <style>
        :root {
            --neon: #39ff14;
            --neon-bg: rgba(57, 255, 20, 0.1);
            --error: #ff003c;
            --warning: #f4ea11;
            --cyber-blue: #00d2ff;
            --black: #000000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Courier New', monospace; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--black); color: var(--neon); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 1000;
        }
        .scanline {
            width: 100%; height: 100px; z-index: 1001; position: absolute;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(57, 255, 20, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1; pointer-events: none; animation: scan 6s linear infinite;
        }
        @keyframes scan { from { top: -100px; } to { top: 100%; } }

        #game-container {
            height: 100%; display: flex; flex-direction: column; padding: 20px;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            border: 2px solid var(--neon); margin: 10px; box-shadow: inset 0 0 50px rgba(57, 255, 20, 0.2);
            position: relative;
        }

        .screen { display: none; flex-direction: column; height: 100%; animation: flicker 0.15s infinite; }
        .screen.active { display: flex; }
        @keyframes flicker { 
            0% { opacity: 0.97; } 5% { opacity: 0.95; } 10% { opacity: 0.9; } 15% { opacity: 0.95; } 
            20% { opacity: 0.98; } 100% { opacity: 1; } 
        }

        h1 { font-size: 3rem; text-align: center; margin: 20px 0; letter-spacing: 5px; text-shadow: 0 0 10px var(--neon); }
        .glitch-text { animation: textGlitch 2s infinite; }
        @keyframes textGlitch {
            0% { transform: translate(0); } 2% { transform: translate(-2px, 2px); } 4% { transform: translate(2px, -2px); } 6% { transform: translate(0); }
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 40px var(--neon), 0 0 80px var(--cyber-blue); transform: scale(1); }
            50% { box-shadow: 0 0 60px var(--neon), 0 0 120px var(--cyber-blue); transform: scale(1.05); }
        }

        #options-container { display: grid; gap: 15px; margin-top: auto; margin-bottom: 20px; }
        .option-btn {
            background: var(--neon-bg); border: 1px solid var(--neon); color: var(--neon);
            padding: 20px; font-size: 1.1rem; text-transform: uppercase; cursor: pointer;
            transition: 0.1s; position: relative; overflow: hidden;
        }
        .option-btn:hover, .option-btn:focus-visible { 
            background: var(--neon); color: var(--black); box-shadow: 0 0 30px var(--neon);
            outline: none;
        }
        button:focus-visible { outline: 3px solid var(--neon); outline-offset: 4px; }

        #question-box {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 1.4rem; padding: 20px; border-bottom: 1px solid var(--neon-bg);
        }

        #timer-wrap { width: 100%; height: 5px; background: #222; margin-bottom: 10px; }
        #timer-fill { height: 100%; width: 100%; background: var(--neon); transition: width 0.1s linear; }

        #ack-overlay {
            position: fixed; top: 50%; left: 50%; width: 90%; max-width: 500px;
            padding: 40px; background: rgba(0, 0, 0, 0.98); 
            border: 4px solid var(--error); border-radius: 2px;
            transform: translate(-50%, -50%) scale(0); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000; text-align: center; box-shadow: 0 0 100px rgba(255, 0, 60, 0.6);
        }
        #ack-overlay.active { transform: translate(-50%, -50%) scale(1); }
        .ack-title { color: var(--error); font-weight: bold; font-size: 1.4rem; margin-bottom: 20px; text-shadow: 0 0 10px var(--error); }
        .ack-content { color: var(--warning); font-size: 1.8rem; text-transform: uppercase; line-height: 1.4; text-shadow: 0 0 15px var(--warning); }

        #score-panel { position: absolute; top: 10px; right: 20px; text-align: right; font-size: 0.8rem; opacity: 0.8; }
        #streak-info { color: var(--cyber-blue); font-weight: bold; display: none; }
        #lives-display { color: var(--error); font-weight: bold; }

        #game-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(8px); z-index: 3000;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .overlay-content { border: 2px solid var(--neon); padding: 40px; text-align: center; max-width: 90%; }
        .cyber-select { background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 10px; width: 100%; margin: 10px 0; }

        #leaderboard-list { list-style: none; padding: 0; font-size: 0.8rem; color: var(--cyber-blue); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="scanline"></div>
    
    <div id="game-container">
        <div id="score-panel" aria-live="polite">
            SYSTEM_STATUS: ONLINE<br>
            LIVES: <span id="lives-display">3</span><br>
            BEST: <span id="high-score">0</span><br>
            <span id="streak-info">STREAK: 0</span>
        </div>
        
        <div id="start-screen" class="screen active" style="justify-content: flex-start; align-items: center; padding-top: 5vh;">
            <div style="text-align: center; position: relative; z-index: 10; width: 100%; max-width: 600px;">
                <h1 class="glitch-text" style="font-size: clamp(2rem, 8vw, 4rem); margin-bottom: 2vh; text-shadow: 0 0 30px var(--neon), 0 0 60px var(--cyber-blue);">A.C.K.</h1>
                <div style="width: min(80vw, 400px); height: min(80vw, 400px); margin: 0 auto 2vh; position: relative; display: flex; align-items: center; justify-content: center;">
                    <img src="./assets/images/ack_core.png" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 20px var(--neon)); animation: pulse 4s infinite;">
                </div>
                <p style="font-size: clamp(0.8rem, 3vw, 1.2rem); color: var(--cyber-blue); margin-bottom: 2vh; letter-spacing: 3px;">AUTONOMOUS CYBERNETIC KERNEL</p>
                <div class="cyber-box" style="text-align:center; width: 90%; max-width: 400px; margin: 0 auto;">
                    <select id="category-filter" class="cyber-select" aria-label="Sektor auswählen">
                        <option value="all">ALL_SECTORS</option>
                    </select>
                    <div style="display: grid; gap: 10px; margin-top: 15px;">
                        <button class="option-btn" onclick="initGame('de')" aria-label="Start in Deutsch" style="padding: 15px;">PROTOKOLL_STARTEN (DE)</button>
                        <button class="option-btn" onclick="initGame('en')" aria-label="Start in English" style="padding: 15px;">START_PROTOCOL (EN)</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div id="timer-wrap"><div id="timer-fill"></div></div>
            <div id="question-box" role="status">INITIALISIERE_DATENSATZ...</div>
            <div id="options-container" role="radiogroup" aria-labelledby="question-box"></div>
        </div>
    </div>

    <div id="ack-overlay">
        <div class="ack-title">>> SYSTEM_RESPONSE_ACK:</div>
        <div class="ack-content" id="ack-msg">DU VERSAGST!</div>
    </div>

    <div id="game-overlay">
        <div class="overlay-content">
            <h2 id="overlay-title">SYSTEM_HALT</h2>
            <p id="overlay-message"></p>
            <div id="leaderboard-display">
                <ul id="leaderboard-list"></ul>
            </div>
            <button onclick="location.reload()" class="option-btn">REBOOT_SYSTEM</button>
        </div>
    </div>

    <script>
        let state = { 
            lang: 'de', questions: [], current: 0, score: 0, streak: 0, lives: 3,
            best: parseInt(localStorage.getItem('dfwa_best') || 0),
            leaderboard: JSON.parse(localStorage.getItem('dfwa_leaderboard') || "[]"),
            timer: null, comments: {}, selectedCat: 'all'
        };

        async function initGame(l) {
            state.lang = l;
            document.documentElement.lang = l;
            state.selectedCat = document.getElementById('category-filter').value;
            state.lives = 3;
            document.getElementById('lives-display').innerText = state.lives;
            
            try {
                const [qRes, cRes] = await Promise.all([
                    fetch('questions_i18n.json?v=' + Date.now()), 
                    fetch('ack_comments.json?v=' + Date.now())
                ]);
                let allQ = await qRes.json();
                state.comments = await cRes.json();
                
                state.questions = state.selectedCat === 'all' ? allQ : allQ.filter(q => q.cat === state.selectedCat);
                state.questions.sort(() => Math.random() - 0.5);
                
                document.getElementById('start-screen').classList.remove('active');
                document.getElementById('game-screen').classList.add('active');
                renderQuestion();
            } catch (e) { console.error(e); }
        }

        function renderQuestion() {
            const q = state.questions[state.current];
            if (!q) { finishGame(true, "DATENSATZ_VOLLSTÄNDIG_ABSORBIERT."); return; }
            
            document.getElementById('question-box').innerText = q.text[state.lang];
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options[state.lang].forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.setAttribute('role', 'radio');
                btn.setAttribute('aria-label', `Option ${i+1}: ${opt}`);
                btn.onclick = () => checkAnswer(i === q.correct);
                container.appendChild(btn);
            });
            startTimer();
        }

        function checkAnswer(correct) {
            clearInterval(state.timer);
            if (correct) {
                state.streak++;
                let bonus = (state.streak > 1) ? (state.streak - 1) * 10 : 0;
                state.score += (100 + bonus);
                
                if (state.score > state.best) {
                    state.best = state.score;
                    localStorage.setItem('dfwa_best', state.best);
                    document.getElementById('high-score').innerText = state.best;
                }
                
                const streakInfo = document.getElementById('streak-info');
                if (state.streak >= 2) {
                    streakInfo.innerText = `STREAK: ${state.streak} (+${bonus})`;
                    streakInfo.style.display = 'inline';
                }
                
                const pool = state.comments[state.lang].correct;
                const msg = pool[Math.floor(Math.random() * pool.length)];
                const overlay = document.getElementById('ack-overlay');
                document.getElementById('ack-msg').innerText = msg;
                overlay.style.borderColor = 'var(--neon)';
                overlay.classList.add('active');
                
                setTimeout(() => {
                    overlay.classList.remove('active');
                    state.current++;
                    renderQuestion();
                }, 1500);
            } else {
                state.lives--;
                document.getElementById('lives-display').innerText = state.lives;
                state.streak = 0;
                document.getElementById('streak-info').style.display = 'none';
                
                const pool = state.comments[state.lang].incorrect;
                const msg = pool[Math.floor(Math.random() * pool.length)];
                
                const overlay = document.getElementById('ack-overlay');
                document.getElementById('ack-msg').innerText = msg;
                overlay.style.borderColor = 'var(--error)';
                overlay.classList.add('active');
                
                setTimeout(() => {
                    overlay.classList.remove('active');
                    if (state.lives <= 0) {
                        finishGame(false, "SYSTEM_FAILURE. EXISTENZ_TERMINIERT.");
                    } else {
                        state.current++;
                        renderQuestion();
                    }
                }, 2000);
            }
        }

        function finishGame(victory, msg) {
            clearInterval(state.timer);
            const overlay = document.getElementById('game-overlay');
            document.getElementById('overlay-title').innerText = victory ? "VICTORY" : "GAME_OVER";
            document.getElementById('overlay-message').innerText = msg;
            
            // Leaderboard update
            state.leaderboard.push({score: state.score, date: new Date().toLocaleDateString()});
            state.leaderboard.sort((a,b) => b.score - a.score);
            state.leaderboard = state.leaderboard.slice(0, 5);
            localStorage.setItem('dfwa_leaderboard', JSON.stringify(state.leaderboard));
            
            const lbList = document.getElementById('leaderboard-list');
            lbList.innerHTML = state.leaderboard.map(e => `<li>${e.score} PTS - ${e.date}</li>`).join('');
            
            overlay.style.display = 'flex';
        }

        function startTimer() {
            let w = 100;
            const bar = document.getElementById('timer-fill');
            const speed = Math.max(10, 70 - (state.current * 2));
            state.timer = setInterval(() => {
                w -= 1; bar.style.width = w + '%';
                if (w <= 0) checkAnswer(false);
            }, speed);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '4') {
                const btns = document.querySelectorAll('#options-container .option-btn');
                if (btns[e.key - 1]) btns[e.key - 1].click();
            }
        });

        // Dynamic categories
        fetch('questions_i18n.json').then(r => r.json()).then(qs => {
            const cats = [...new Set(qs.map(q => q.cat))];
            const select = document.getElementById('category-filter');
            cats.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.innerText = c.toUpperCase();
                select.appendChild(opt);
            });
        });

        document.getElementById('high-score').innerText = state.best;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    reg.update();
                    reg.onupdatefound = () => {
                        const w = reg.installing;
                        w.onstatechange = () => { 
                            if (w.state === 'installed' && navigator.serviceWorker.controller) location.reload(); 
                        };
                    };
                });
            });
        }
    </script>
</body>
</html>
