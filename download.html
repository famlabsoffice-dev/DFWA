<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="./manifest.json">
    <title>ACK ATTACK - INSTALL_GATEWAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: #39ff14;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }
        #eye-container {
            width: 80vw; max-width: 400px; margin-bottom: 40px;
            filter: drop-shadow(0 0 20px #39ff14);
        }
        #eye-container img { width: 100%; height: auto; }
        h1 {
            font-family: Impact, sans-serif; font-size: 2.5rem; letter-spacing: 5px;
            margin-bottom: 20px; text-shadow: 0 0 10px #39ff14;
        }
        .install-btn {
            background: #000; border: 2px solid #00d2ff; color: #00d2ff;
            padding: 20px 40px; font-size: 1.2rem; font-weight: 900;
            text-transform: uppercase; cursor: pointer;
            letter-spacing: 2px; transition: 0.3s;
        }
        .install-btn:hover {
            background: #00d2ff; color: #000; box-shadow: 0 0 30px #00d2ff;
        }
        .status-text {
            margin-top: 20px; font-family: monospace; font-size: 0.8rem; opacity: 0.7;
        }
        #manual-hint {
            display: none; margin-top: 20px; text-align: center; color: #00d2ff; font-size: 0.9rem;
            max-width: 80%; line-height: 1.4;
        }
    </style>
</head>
<body>
    <div id="eye-container">
        <img src="./assets/images/ack_core_clean.png" alt="ACK CORE">
    </div>
    <h1>ACK ATTACK</h1>
    <button id="install-btn" class="install-btn">INITIALIZE_APP</button>
    <div id="manual-hint">
        BROWSER-MENÜ ÖFFNEN > "ZUM STARTBILDSCHIRM HINZUFÜGEN"
    </div>
    <div class="status-text">SYSTEM_READY // GATEWAY_V2</div>

    <script>
        // Registriere Service Worker für PWA-Erkennung
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');
        const manualHint = document.getElementById('manual-hint');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.innerText = "INSTALL_APP_NOW";
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    window.location.href = "index.html";
                }
                deferredPrompt = null;
            } else {
                // Fallback für iOS oder wenn Event nicht gefeuert wurde
                manualHint.style.display = 'block';
                installBtn.innerText = "TRY_MANUAL_INSTALL";
                // Kurze Verzögerung, dann zur Haupt-App leiten falls Installation nicht möglich
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 3000);
            }
        });

        window.addEventListener('appinstalled', () => {
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
